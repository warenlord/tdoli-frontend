<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>TDOLI — Profil</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#060d09;--surface:#0c1710;--card:#111e15;--green:#00c97a;--green-dim:#009e60;--green-glow:rgba(0,201,122,0.12);--yellow:#fcd116;--blue:#1a4fff;--red:#ff4444;--text:#e8f2eb;--text-2:#a8bfad;--text-3:#5a7560;--border:rgba(255,255,255,0.07);--border-active:rgba(0,201,122,0.2);--r:16px;}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:88px;overflow-x:hidden;}
.topbar{position:sticky;top:0;z-index:100;background:rgba(6,13,9,0.9);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:14px 20px;display:flex;align-items:center;justify-content:space-between;}
.topbar-logo{font-family:'Syne',sans-serif;font-weight:800;font-size:20px;}
.topbar-logo .l1{color:var(--green);}.topbar-logo .l2{color:var(--yellow);}.topbar-logo .l3{color:var(--green);}.topbar-logo .l4{color:var(--blue);}.topbar-logo .l5{color:var(--yellow);}
.topbar-title{font-family:'Syne',sans-serif;font-size:14px;font-weight:700;color:var(--text-2);}
.content{position:relative;z-index:1;padding:20px;max-width:480px;margin:0 auto;}
.profile-hero{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:24px;margin-bottom:16px;text-align:center;position:relative;overflow:hidden;}
.profile-hero::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--green),var(--yellow),var(--blue));}
.avatar-large{width:72px;height:72px;border-radius:50%;background:linear-gradient(135deg,var(--green-dim),var(--blue));display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-size:26px;font-weight:800;color:#fff;margin:0 auto 14px;border:2px solid var(--border-active);}
.profile-username{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;margin-bottom:2px;}
.profile-fullname{font-size:13px;color:var(--text-2);margin-bottom:2px;}
.profile-email{font-size:12px;color:var(--text-3);margin-bottom:4px;}
.profile-country{font-size:12px;color:var(--text-3);margin-bottom:12px;}
.profile-badges{display:flex;justify-content:center;gap:8px;flex-wrap:wrap;margin-bottom:12px;}
.badge-item{display:flex;align-items:center;gap:5px;font-size:11px;font-weight:700;font-family:'Syne',sans-serif;padding:4px 10px;border-radius:20px;}
.badge-level1{background:rgba(255,255,255,0.05);color:var(--text-3);border:1px solid var(--border);}
.badge-level2{background:rgba(0,201,122,0.1);color:var(--green);border:1px solid rgba(0,201,122,0.2);}
.badge-suspended{background:rgba(255,68,68,0.1);color:var(--red);border:1px solid rgba(255,68,68,0.2);}
.profile-rating{display:flex;align-items:center;justify-content:center;gap:6px;margin-bottom:4px;}
.stars-display{color:var(--yellow);font-size:18px;}
.rating-val{font-family:'Syne',sans-serif;font-size:16px;font-weight:800;color:var(--yellow);}
.rating-count{font-size:12px;color:var(--text-3);}

/* Section vérification */
.verify-card{background:var(--card);border:1px solid var(--border-active);border-radius:var(--r);padding:20px;margin-bottom:16px;position:relative;overflow:hidden;}
.verify-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--green),var(--yellow));}
.verify-title{font-family:'Syne',sans-serif;font-size:15px;font-weight:700;margin-bottom:6px;}
.verify-sub{font-size:13px;color:var(--text-3);margin-bottom:16px;line-height:1.5;}
.verify-benefits{display:flex;flex-direction:column;gap:6px;margin-bottom:16px;}
.verify-benefit{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--text-2);}
.verify-benefit-dot{width:6px;height:6px;border-radius:50%;background:var(--green);flex-shrink:0;}
.limit-bar{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between;}
.limit-label{font-size:12px;color:var(--text-3);}
.limit-val{font-family:'Syne',sans-serif;font-size:14px;font-weight:700;color:var(--yellow);}
.phone-step{display:none;}.phone-step.active{display:block;}

.stats-row{display:flex;gap:12px;margin-bottom:16px;}
.stat-card{flex:1;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;text-align:center;}
.stat-val{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;color:var(--green);margin-bottom:4px;}
.stat-label{font-size:11px;color:var(--text-3);}
.section-title{font-family:'Syne',sans-serif;font-size:14px;font-weight:700;margin-bottom:12px;color:var(--text-2);}
.tx-item{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px 16px;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;}
.tx-ref{font-size:11px;color:var(--text-3);font-family:'Syne',sans-serif;}
.tx-dir{font-size:13px;font-weight:500;margin-top:2px;}
.tx-amt{font-family:'Syne',sans-serif;font-size:14px;font-weight:700;}
.tx-status{font-size:10px;padding:2px 8px;border-radius:10px;margin-top:3px;display:inline-block;}
.tx-status.completed{background:rgba(0,201,122,0.1);color:var(--green);}
.tx-status.matched{background:rgba(252,209,22,0.1);color:var(--yellow);}
.tx-status.dispute{background:rgba(255,68,68,0.1);color:var(--red);}
.settings-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:16px;}
.settings-item{display:flex;align-items:center;justify-content:space-between;padding:16px 18px;border-bottom:1px solid var(--border);cursor:pointer;transition:background 0.2s;}
.settings-item:last-child{border-bottom:none;}
.settings-item:active{background:var(--surface);}
.settings-label{font-size:14px;}
.settings-arrow{color:var(--text-3);}
.settings-val{font-size:12px;color:var(--text-3);}
.btn-logout{width:100%;padding:15px;background:transparent;color:#ff6b6b;border:1px solid rgba(255,68,68,0.25);border-radius:13px;font-family:'Syne',sans-serif;font-size:14px;font-weight:700;cursor:pointer;margin-bottom:16px;}
.cgu-link{display:block;text-align:center;font-size:12px;color:var(--text-3);text-decoration:none;margin-bottom:16px;}
.cgu-link:hover{color:var(--green);}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;z-index:100;background:rgba(6,13,9,0.94);backdrop-filter:blur(20px);border-top:1px solid var(--border);display:flex;padding:8px 0 24px;}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 0;color:var(--text-3);font-size:9px;font-family:'Syne',sans-serif;font-weight:700;letter-spacing:0.8px;text-transform:uppercase;text-decoration:none;transition:color 0.2s;}
.nav-item.active{color:var(--green);}
.nav-icon{width:20px;height:20px;display:flex;align-items:center;justify-content:center;}
svg{fill:none;stroke:currentColor;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;}
.overlay{position:fixed;inset:0;z-index:300;background:rgba(0,0,0,0.65);backdrop-filter:blur(8px);display:none;align-items:flex-end;}
.overlay.open{display:flex;}
.sheet{background:var(--card);border:1px solid var(--border);border-top:1px solid var(--border-active);border-radius:22px 22px 0 0;padding:0 22px 48px;width:100%;max-width:480px;margin:0 auto;animation:slideUp 0.35s cubic-bezier(0.19,1,0.22,1);}
@keyframes slideUp{from{transform:translateY(100%);opacity:0;}to{transform:translateY(0);opacity:1;}}
.sheet-handle-row{padding:16px 0 18px;display:flex;justify-content:center;}
.sheet-handle{width:34px;height:3px;border-radius:2px;background:var(--border);}
.sheet-title{font-family:'Syne',sans-serif;font-size:18px;font-weight:800;margin-bottom:20px;}
.form-group{margin-bottom:16px;}
.form-label{display:block;font-size:11px;font-weight:500;color:var(--text-3);margin-bottom:8px;letter-spacing:1px;text-transform:uppercase;}
.form-input{width:100%;padding:14px 16px;background:var(--surface);border:1px solid var(--border);border-radius:12px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:16px;-webkit-appearance:none;transition:all 0.2s;}
.form-input:focus{outline:none;border-color:var(--green);box-shadow:0 0 0 3px var(--green-glow);}
.otp-wrap{display:flex;gap:8px;justify-content:center;margin:4px 0 16px;}
.otp-digit{width:46px;height:56px;border-radius:12px;background:var(--surface);border:1px solid var(--border);color:var(--text);font-family:'Syne',sans-serif;font-size:22px;font-weight:700;text-align:center;transition:all 0.2s;-webkit-appearance:none;}
.otp-digit:focus{outline:none;border-color:var(--green);box-shadow:0 0 0 3px var(--green-glow);}
.btn-primary{width:100%;padding:15px;background:linear-gradient(135deg,var(--green-dim) 0%,#004d2a 50%,#001a6e 100%);color:#fff;border:none;border-radius:13px;font-family:'Syne',sans-serif;font-size:14px;font-weight:700;cursor:pointer;position:relative;overflow:hidden;margin-top:6px;}
.btn-primary::after{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,var(--green),var(--yellow),var(--blue));}
.btn-primary:disabled{opacity:0.35;}
.btn-cancel{width:100%;padding:13px;background:transparent;color:var(--text-3);border:1px solid var(--border);border-radius:13px;font-family:'Syne',sans-serif;font-size:13px;font-weight:600;cursor:pointer;margin-top:8px;}
.msg{display:none;padding:11px 14px;border-radius:10px;font-size:13px;margin-top:12px;}
.msg.error{background:rgba(255,68,68,0.08);border:1px solid rgba(255,68,68,0.2);color:#ff6b6b;}
.msg.success{background:rgba(0,201,122,0.08);border:1px solid rgba(0,201,122,0.2);color:var(--green);}
.msg.show{display:block;}
.spinner{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,0.2);border-top-color:#fff;border-radius:50%;animation:spin 0.5s linear infinite;vertical-align:middle;margin-right:6px;}
@keyframes spin{to{transform:rotate(360deg);}}
.loading-wrap{display:flex;align-items:center;justify-content:center;padding:40px;gap:10px;color:var(--text-3);}
.loader{width:22px;height:22px;position:relative;}
.loader::before,.loader::after{content:'';position:absolute;inset:0;border-radius:50%;border:2px solid transparent;animation:spin 1s linear infinite;}
.loader::before{border-top-color:var(--green);}.loader::after{border-bottom-color:var(--blue);animation-duration:1.5s;animation-direction:reverse;}
</style>
</head>
<body>
<div class="topbar">
  <div class="topbar-logo"><span class="l1">T</span><span class="l2">D</span><span class="l3">O</span><span class="l4">L</span><span class="l5">I</span></div>
  <div class="topbar-title">Profil</div>
</div>
<div class="content"><div id="profileContent"><div class="loading-wrap"><div class="loader"></div></div></div></div>
<nav class="bottom-nav">
  <a class="nav-item" href="/tdoli-feed.html"><div class="nav-icon"><svg viewBox="0 0 24 24" width="20" height="20"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg></div>Feed</a>
  <a class="nav-item" href="/tdoli-deals.html"><div class="nav-icon"><svg viewBox="0 0 24 24" width="20" height="20"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 014-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 01-4 4H3"/></svg></div>Deals</a>
  <a class="nav-item active" href="/tdoli-profile.html"><div class="nav-icon"><svg viewBox="0 0 24 24" width="20" height="20"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></div>Profil</a>
</nav>
<!-- Sheet modifier profil -->
<div class="overlay" id="editOverlay" onclick="closeOnOverlay(event,'editOverlay')">
  <div class="sheet">
    <div class="sheet-handle-row"><div class="sheet-handle"></div></div>
    <div class="sheet-title">Modifier le profil</div>
    <div class="form-group"><label class="form-label">Prénom</label><input class="form-input" type="text" id="edit-firstname" placeholder="Prénom"></div>
    <div class="form-group"><label class="form-label">Nom</label><input class="form-input" type="text" id="edit-lastname" placeholder="Nom"></div>
    <button class="btn-primary" id="btn-save-profile" onclick="saveProfile()">Enregistrer</button>
    <button class="btn-cancel" onclick="closeSheet('editOverlay')">Annuler</button>
    <div class="msg" id="msg-profile"></div>
  </div>
</div>
<!-- Sheet vérification téléphone -->
<div class="overlay" id="phoneOverlay" onclick="closeOnOverlay(event,'phoneOverlay')">
  <div class="sheet">
    <div class="sheet-handle-row"><div class="sheet-handle"></div></div>
    <div class="sheet-title">Vérifier mon téléphone</div>
    <!-- Step 1 : saisir numéro -->
    <div class="phone-step active" id="phone-step1">
      <div style="font-size:13px;color:var(--text-3);margin-bottom:20px;line-height:1.5;">Entre ton numéro avec l'indicatif pays. Ex: <strong style="color:var(--text)">+33 6 12 34 56 78</strong></div>
      <div class="form-group"><label class="form-label">Numéro de téléphone</label><input class="form-input" type="tel" id="phone-input" placeholder="+33 6 12 34 56 78"></div>
      <button class="btn-primary" id="btn-send-sms" onclick="sendSms()">Envoyer le code SMS</button>
      <button class="btn-cancel" onclick="closeSheet('phoneOverlay')">Annuler</button>
      <div class="msg" id="msg-phone-step1"></div>
    </div>
    <!-- Step 2 : saisir code -->
    <div class="phone-step" id="phone-step2">
      <div style="font-size:13px;color:var(--text-3);margin-bottom:16px;">Code envoyé sur <strong id="phone-display" style="color:var(--text)"></strong></div>
      <div class="otp-wrap">
        <input class="otp-digit" type="tel" maxlength="1" id="sms0" oninput="smsOtpInput(0)">
        <input class="otp-digit" type="tel" maxlength="1" id="sms1" oninput="smsOtpInput(1)">
        <input class="otp-digit" type="tel" maxlength="1" id="sms2" oninput="smsOtpInput(2)">
        <input class="otp-digit" type="tel" maxlength="1" id="sms3" oninput="smsOtpInput(3)">
        <input class="otp-digit" type="tel" maxlength="1" id="sms4" oninput="smsOtpInput(4)">
        <input class="otp-digit" type="tel" maxlength="1" id="sms5" oninput="smsOtpInput(5)">
      </div>
      <button class="btn-primary" id="btn-verify-sms" onclick="verifySms()">Vérifier le code</button>
      <button class="btn-cancel" onclick="backToPhoneStep1()">Retour</button>
      <div class="msg" id="msg-phone-step2"></div>
    </div>
  </div>
</div>
<script>
const API='https://tdoli-backend.onrender.com';
const token=localStorage.getItem('tdoli_token');
const email=localStorage.getItem('tdoli_email');
if(!token)window.location.href='/tdoli-auth.html';
function logout(){localStorage.clear();window.location.href='/tdoli-auth.html';}
function closeOnOverlay(e,id){if(e.target===document.getElementById(id))closeSheet(id);}
function closeSheet(id){document.getElementById(id).classList.remove('open');}
function renderStars(r){if(!r||r===0)return'<span style="color:var(--text-3);font-size:12px;">Nouveau</span>';const f=Math.round(r);return'★'.repeat(f)+'☆'.repeat(5-f);}
function showMsg(id,text,type){const el=document.getElementById(id);el.className='msg '+(type||'error')+' show';el.textContent=text;}

async function loadProfile(){
  try{
    const [dealsRes,profileRes]=await Promise.all([
      fetch(API+'/deals/mine',{headers:{'Authorization':'Bearer '+token}}),
      fetch(API+'/profile/'+encodeURIComponent(email),{headers:{'Authorization':'Bearer '+token}})
    ]);
    const deals=dealsRes.ok?await dealsRes.json():[];
    const userData=profileRes.ok?await profileRes.json():{};
    const username=userData.username||email?.split('@')[0]||'?';
    const firstName=userData.firstName||'';const lastName=userData.lastName||'';
    const country=userData.country||'';
    const initials=(firstName?firstName[0]:'')+(lastName?lastName[0]:'');
    const rating=userData.averageRating||0;const totalDeals=userData.totalDeals||0;
    const verLevel=userData.verificationLevel||1;
    const phoneVerified=userData.phoneVerified||false;
    const maxDeal=userData.maxDealAmount||300;
    const isSuspended=userData.isSuspended||false;
    const completed=Array.isArray(deals)?deals.filter(d=>d.status==='completed').length:0;
    const active=Array.isArray(deals)?deals.filter(d=>d.status==='matched').length:0;
    const recentDeals=Array.isArray(deals)?deals.slice(0,5):[];
    localStorage.setItem('tdoli_username',username);

    // Badge niveau
    let badgeHtml='';
    if(isSuspended){
      badgeHtml='<span class="badge-item badge-suspended">⛔ Suspendu</span>';
    } else if(verLevel>=2){
      badgeHtml='<span class="badge-item badge-level2">✓ Vérifié</span>';
    } else {
      badgeHtml='<span class="badge-item badge-level1">Niveau 1</span>';
    }

    // Section vérification
    let verifySection='';
    if(!phoneVerified&&!isSuspended){
      verifySection=`
        <div class="verify-card">
          <div class="verify-title">🔐 Vérifier mon téléphone</div>
          <div class="verify-sub">Passe au Niveau 2 pour augmenter ta limite et gagner la confiance des autres utilisateurs.</div>
          <div class="limit-bar">
            <div><div class="limit-label">Limite actuelle</div><div class="limit-val">${maxDeal}€ par deal</div></div>
            <div style="text-align:right"><div class="limit-label">Après vérification</div><div style="font-family:'Syne',sans-serif;font-size:14px;font-weight:700;color:var(--green)">1 000€</div></div>
          </div>
          <div class="verify-benefits">
            <div class="verify-benefit"><div class="verify-benefit-dot"></div>Badge "Vérifié ✓" sur tes annonces</div>
            <div class="verify-benefit"><div class="verify-benefit-dot"></div>Limite portée à 1 000€ par deal</div>
            <div class="verify-benefit"><div class="verify-benefit-dot"></div>Plus de deals grâce à la confiance accrue</div>
          </div>
          <button class="btn-primary" onclick="openPhoneVerif()">Vérifier mon téléphone</button>
        </div>`;
    } else if(phoneVerified){
      verifySection=`
        <div class="verify-card" style="border-color:rgba(0,201,122,0.3);">
          <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px;">
            <div style="width:36px;height:36px;border-radius:50%;background:var(--green-glow);border:1px solid var(--border-active);display:flex;align-items:center;justify-content:center;font-size:16px;">✓</div>
            <div><div class="verify-title" style="margin-bottom:0">Téléphone vérifié</div><div style="font-size:12px;color:var(--text-3);">${userData.phone||''}</div></div>
          </div>
          <div class="limit-bar"><div><div class="limit-label">Limite actuelle</div><div class="limit-val" style="color:var(--green)">${maxDeal}€ par deal</div></div></div>
        </div>`;
    }

    document.getElementById('profileContent').innerHTML=
      '<div class="profile-hero">'+
        '<div class="avatar-large">'+(initials||username.substring(0,2).toUpperCase())+'</div>'+
        '<div class="profile-username">'+username+'</div>'+
        (firstName||lastName?'<div class="profile-fullname">'+firstName+' '+lastName+'</div>':'')+
        '<div class="profile-email">'+email+'</div>'+
        (country?'<div class="profile-country">📍 '+country+'</div>':'')+
        '<div class="profile-badges">'+badgeHtml+'</div>'+
        '<div class="profile-rating"><span class="stars-display">'+renderStars(rating)+'</span>'+(rating>0?'<span class="rating-val"> '+rating.toFixed(1)+'</span>':'')+'</div>'+
        '<div class="rating-count">'+totalDeals+' deal'+(totalDeals>1?'s':'')+' complété'+(totalDeals>1?'s':'')+'</div>'+
      '</div>'+
      verifySection+
      '<div class="stats-row">'+
        '<div class="stat-card"><div class="stat-val">'+completed+'</div><div class="stat-label">Complétés</div></div>'+
        '<div class="stat-card"><div class="stat-val">'+active+'</div><div class="stat-label">En cours</div></div>'+
        '<div class="stat-card"><div class="stat-val">'+(rating>0?rating.toFixed(1):'—')+'</div><div class="stat-label">Note moy.</div></div>'+
      '</div>'+
      (recentDeals.length>0?'<div class="section-title">Transactions récentes</div>'+recentDeals.map(d=>{const isSender=d.sender===email;return '<div class="tx-item"><div><div class="tx-ref">REF '+d._id.slice(-6).toUpperCase()+'</div><div class="tx-dir">'+(isSender?'Envoi':'Réception')+' · '+d.fromCountry+' → '+d.toCountry+'</div></div><div style="text-align:right"><div class="tx-amt">'+Number(d.amount).toLocaleString('fr-FR')+' '+d.currency+'</div><span class="tx-status '+d.status+'">'+ {matched:'En cours',completed:'Complété',dispute:'Litige'}[d.status]+'</span></div></div>';}).join(''):'')+
      '<div class="section-title" style="margin-top:8px">Paramètres</div>'+
      '<div class="settings-card">'+
        '<div class="settings-item" onclick="openEdit(\''+firstName+'\',\''+lastName+'\')"><span class="settings-label">Modifier le profil</span><span class="settings-arrow">→</span></div>'+
        '<div class="settings-item" onclick="alert(\'Bientôt disponible\')"><span class="settings-label">Notifications</span><span class="settings-arrow">→</span></div>'+
      '</div>'+
      '<a href="/tdoli-cgu.html" class="cgu-link">Conditions d\'utilisation</a>'+
      '<button class="btn-logout" onclick="logout()">Se déconnecter</button>';
  }catch(e){document.getElementById('profileContent').innerHTML='<div class="loading-wrap">Erreur de chargement</div>';}
}

// Modifier profil
function openEdit(firstName,lastName){
  document.getElementById('edit-firstname').value=firstName;document.getElementById('edit-lastname').value=lastName;
  document.getElementById('editOverlay').classList.add('open');
  setTimeout(()=>document.getElementById('edit-firstname').focus(),300);
}
async function saveProfile(){
  const firstName=document.getElementById('edit-firstname').value.trim();const lastName=document.getElementById('edit-lastname').value.trim();
  if(!firstName||!lastName){showMsg('msg-profile','Remplis tous les champs','error');return;}
  const btn=document.getElementById('btn-save-profile');btn.disabled=true;btn.innerHTML='<span class="spinner"></span>';
  try{const res=await fetch(API+'/profile',{method:'PUT',headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},body:JSON.stringify({firstName,lastName,username:firstName+' '+lastName})});
    const data=await res.json();
    if(res.ok){localStorage.setItem('tdoli_username',data.username);closeSheet('editOverlay');loadProfile();}
    else showMsg('msg-profile',data.message||'Erreur','error');
  }catch(e){showMsg('msg-profile','Serveur inaccessible','error');}
  btn.disabled=false;btn.innerHTML='Enregistrer';
}

// Vérification téléphone
function openPhoneVerif(){
  document.getElementById('phone-step1').className='phone-step active';document.getElementById('phone-step2').className='phone-step';
  document.getElementById('phoneOverlay').classList.add('open');
  setTimeout(()=>document.getElementById('phone-input').focus(),300);
}
function backToPhoneStep1(){
  document.getElementById('phone-step1').className='phone-step active';document.getElementById('phone-step2').className='phone-step';
  [0,1,2,3,4,5].forEach(i=>document.getElementById('sms'+i).value='');
}
async function sendSms(){
  const phone=document.getElementById('phone-input').value.trim();
  if(!phone){showMsg('msg-phone-step1','Entre ton numéro','error');return;}
  const btn=document.getElementById('btn-send-sms');btn.disabled=true;btn.innerHTML='<span class="spinner"></span>Envoi...';
  try{const res=await fetch(API+'/auth/send-sms',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},body:JSON.stringify({phone})});
    const data=await res.json();
    if(res.ok){document.getElementById('phone-display').textContent=phone;document.getElementById('phone-step1').className='phone-step';document.getElementById('phone-step2').className='phone-step active';document.getElementById('sms0').focus();}
    else showMsg('msg-phone-step1',data.message||'Erreur','error');
  }catch(e){showMsg('msg-phone-step1','Serveur inaccessible','error');}
  btn.disabled=false;btn.innerHTML='Envoyer le code SMS';
}
function smsOtpInput(idx){
  const val=document.getElementById('sms'+idx).value;
  if(val&&idx<5)document.getElementById('sms'+(idx+1)).focus();
  const code=[0,1,2,3,4,5].map(i=>document.getElementById('sms'+i).value).join('');
  if(code.length===6)verifySms();
}
async function verifySms(){
  const code=[0,1,2,3,4,5].map(i=>document.getElementById('sms'+i).value).join('');
  if(code.length<6){showMsg('msg-phone-step2','Saisis les 6 chiffres','error');return;}
  const btn=document.getElementById('btn-verify-sms');btn.disabled=true;btn.innerHTML='<span class="spinner"></span>';
  try{const res=await fetch(API+'/auth/verify-sms',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},body:JSON.stringify({code})});
    const data=await res.json();
    if(res.ok){closeSheet('phoneOverlay');showMsg('msg-profile','Téléphone vérifié ! Limite portée à 1 000€.','success');loadProfile();}
    else showMsg('msg-phone-step2',data.message||'Code incorrect','error');
  }catch(e){showMsg('msg-phone-step2','Serveur inaccessible','error');}
  btn.disabled=false;btn.innerHTML='Vérifier le code';
}

function showMsg(id,text,type){const el=document.getElementById(id);if(el){el.className='msg '+(type||'error')+' show';el.textContent=text;}}
loadProfile();
</script>
</body>
</html>
