<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>TDOLI  Profil</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#05090a;--surface:#0b1215;--card:#0f1a1e;
  --green:#00e676;--green-dim:#00c853;--green-glow:rgba(0,230,118,0.12);
  --yellow:#ffd740;--blue:#2979ff;--red:#ff1744;
  --text:#ecf4f0;--text-2:#90a8a0;--text-3:#4a6860;
  --border:rgba(255,255,255,0.06);--border-active:rgba(0,230,118,0.22);
  --r:14px;--shadow:0 2px 20px rgba(0,0,0,0.5);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:88px;overflow-x:hidden;}
.topbar{position:sticky;top:0;z-index:100;background:rgba(5,9,10,0.96);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-bottom:1px solid var(--border);padding:12px 20px;display:flex;align-items:center;justify-content:space-between;gap:10px;box-shadow:0 1px 12px rgba(0,0,0,0.4);}
.topbar-left{flex-shrink:0;}.topbar-center{flex:1;text-align:center;}.topbar-right{flex-shrink:0;}
.topbar-title{font-family:'Syne',sans-serif;font-size:14px;font-weight:700;color:var(--text-2);}
.user-avatar-btn{width:38px;height:38px;border-radius:50%;background:var(--green-dim);display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-size:13px;font-weight:800;color:#fff;cursor:pointer;text-decoration:none;flex-shrink:0;border:1.5px solid var(--border-active);overflow:hidden;}
.user-avatar-btn img{width:100%;height:100%;object-fit:cover;border-radius:50%;}
.share-btn{background:rgba(252,209,22,0.1);border:1px solid rgba(252,209,22,0.3);color:var(--yellow);font-family:'Syne',sans-serif;font-size:11px;font-weight:700;cursor:pointer;padding:7px 12px;white-space:nowrap;border-radius:20px;}
.content{position:relative;z-index:1;padding:20px;max-width:480px;margin:0 auto;}
.profile-hero{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:24px;margin-bottom:16px;text-align:center;position:relative;overflow:hidden;}
.profile-hero::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--green),var(--yellow),var(--blue));}
.avatar-large{width:72px;height:72px;border-radius:50%;background:var(--green-dim);display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-size:26px;font-weight:800;color:#fff;margin:0 auto 14px;border:2px solid var(--border-active);overflow:hidden;}
.avatar-large img{width:100%;height:100%;object-fit:cover;border-radius:50%;}
.profile-username{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;margin-bottom:2px;}
.profile-email{font-size:12px;color:var(--text-3);margin-bottom:12px;}
.profile-badges{display:flex;justify-content:center;gap:8px;flex-wrap:wrap;margin-bottom:12px;}
.badge-item{font-size:11px;font-weight:700;font-family:'Syne',sans-serif;padding:4px 10px;border-radius:20px;}
.badge-level1{background:rgba(255,255,255,0.05);color:var(--text-3);border:1px solid var(--border);}
.badge-level2{background:rgba(0,201,122,0.1);color:var(--green);border:1px solid rgba(0,201,122,0.2);}
.profile-rating{display:flex;align-items:center;justify-content:center;gap:6px;margin-bottom:4px;}
.stars-display{color:var(--yellow);font-size:18px;}
.rating-val{font-family:'Syne',sans-serif;font-size:16px;font-weight:800;color:var(--yellow);}
.rating-count{font-size:12px;color:var(--text-3);}
.verify-card{background:var(--card);border:1px solid var(--border-active);border-radius:var(--r);padding:20px;margin-bottom:16px;position:relative;overflow:hidden;}
.verify-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--green),var(--yellow));}
.verify-title{font-family:'Syne',sans-serif;font-size:15px;font-weight:700;margin-bottom:6px;}
.verify-sub{font-size:13px;color:var(--text-3);margin-bottom:16px;line-height:1.5;}
.limit-bar{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between;}
.limit-label{font-size:12px;color:var(--text-3);}
.limit-val{font-family:'Syne',sans-serif;font-size:14px;font-weight:700;color:var(--yellow);}
.stats-row{display:flex;gap:12px;margin-bottom:16px;}
.stat-card{flex:1;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;text-align:center;}
.stat-val{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;color:var(--green);margin-bottom:3px;}
.stat-label{font-size:11px;color:var(--text-3);}
.section-title{font-family:'Syne',sans-serif;font-size:14px;font-weight:700;margin-bottom:12px;color:var(--text-2);}
.settings-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:16px;}
.settings-item{display:flex;align-items:center;justify-content:space-between;padding:16px 18px;border-bottom:1px solid var(--border);cursor:pointer;transition:background 0.2s;}
.settings-item:last-child{border-bottom:none;}
.settings-item:active{background:var(--surface);}
.settings-label{font-size:14px;}
.settings-val{font-size:12px;color:var(--text-3);}
.btn-logout{width:100%;padding:15px;background:transparent;color:#ff6b6b;border:1px solid rgba(255,68,68,0.25);border-radius:13px;font-family:'Syne',sans-serif;font-size:14px;font-weight:700;cursor:pointer;margin-bottom:16px;}
.cgu-link{display:block;text-align:center;font-size:12px;color:var(--text-3);text-decoration:none;margin-bottom:16px;}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;z-index:100;background:rgba(5,9,10,0.97);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-top:1px solid var(--border);display:flex;padding:8px 0 24px;box-shadow:0 -2px 20px rgba(0,0,0,0.4);}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 0;color:var(--text-3);font-size:9px;font-family:'Syne',sans-serif;font-weight:700;letter-spacing:0.8px;text-transform:uppercase;text-decoration:none;transition:color 0.2s;}
.nav-item.active{color:var(--green);}
.nav-icon{width:20px;height:20px;display:flex;align-items:center;justify-content:center;}
svg{fill:none;stroke:currentColor;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;}
.overlay{position:fixed;inset:0;z-index:300;background:rgba(0,0,0,0.65);backdrop-filter:blur(8px);display:none;align-items:flex-end;}
.overlay.open{display:flex;}
.sheet{background:var(--card);border:1px solid var(--border);border-top:1px solid var(--border-active);border-radius:22px 22px 0 0;padding:0 22px 48px;width:100%;max-width:480px;margin:0 auto;animation:slideUp 0.35s cubic-bezier(0.19,1,0.22,1);}
@keyframes slideUp{from{transform:translateY(100%);opacity:0;}to{transform:translateY(0);opacity:1;}}
.sheet-handle-row{padding:16px 0 18px;display:flex;justify-content:center;}
.sheet-handle{width:34px;height:3px;border-radius:2px;background:var(--border);}
.sheet-title{font-family:'Syne',sans-serif;font-size:18px;font-weight:800;margin-bottom:20px;}
.form-group{margin-bottom:16px;}
.form-label{display:block;font-size:11px;font-weight:500;color:var(--text-3);margin-bottom:8px;letter-spacing:1px;text-transform:uppercase;}
.form-input{width:100%;padding:14px 16px;background:var(--surface);border:1px solid var(--border);border-radius:12px;color:var(--text);font-family:'Inter',sans-serif;font-size:16px;-webkit-appearance:none;transition:all 0.2s;}
.form-input:focus{outline:none;border-color:var(--green);box-shadow:0 0 0 3px var(--green-glow);}
.otp-wrap{display:flex;gap:8px;justify-content:center;margin:4px 0 16px;}
.otp-digit{width:46px;height:56px;border-radius:12px;background:var(--surface);border:1px solid var(--border);color:var(--text);font-family:'Syne',sans-serif;font-size:22px;font-weight:700;text-align:center;transition:all 0.2s;-webkit-appearance:none;}
.otp-digit:focus{outline:none;border-color:var(--green);box-shadow:0 0 0 3px var(--green-glow);}
.btn-primary{width:100%;padding:15px;background:var(--green-dim);color:#fff;border:none;border-radius:13px;font-family:'Syne',sans-serif;font-size:14px;font-weight:700;cursor:pointer;position:relative;overflow:hidden;margin-top:6px;}
.btn-primary::after{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,var(--green),var(--yellow),var(--blue));}
.btn-primary:disabled{opacity:0.35;}
.btn-cancel{width:100%;padding:13px;background:transparent;color:var(--text-3);border:1px solid var(--border);border-radius:13px;font-family:'Syne',sans-serif;font-size:13px;font-weight:600;cursor:pointer;margin-top:8px;}
.msg{display:none;padding:11px 14px;border-radius:10px;font-size:13px;margin-top:12px;}
.msg.error{background:rgba(255,68,68,0.08);border:1px solid rgba(255,68,68,0.2);color:#ff6b6b;}
.msg.success{background:rgba(0,201,122,0.08);border:1px solid rgba(0,201,122,0.2);color:var(--green);}
.msg.show{display:block;}
.spinner{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,0.2);border-top-color:#fff;border-radius:50%;animation:spin 0.5s linear infinite;vertical-align:middle;margin-right:6px;}
@keyframes spin{to{transform:rotate(360deg);}}
.loading-wrap{display:flex;align-items:center;justify-content:center;padding:60px;gap:10px;color:var(--text-3);}
.loader{width:22px;height:22px;position:relative;}
.loader::before,.loader::after{content:'';position:absolute;inset:0;border-radius:50%;border:2px solid transparent;animation:spin 1s linear infinite;}
.loader::before{border-top-color:var(--green);}.loader::after{border-bottom-color:var(--blue);animation-duration:1.5s;animation-direction:reverse;}
.phone-step{display:none;}.phone-step.active{display:block;}

/* RANG COMMUNAUTAIRE */
.rank-hero{display:inline-flex;align-items:center;gap:6px;font-family:'Syne',sans-serif;font-size:12px;font-weight:700;border-radius:20px;padding:5px 14px;margin-bottom:10px;}
.rank-hero.nouveau{background:rgba(255,255,255,0.05);color:var(--text-3);border:1px solid var(--border);}
.rank-hero.actif{background:rgba(0,201,122,0.1);color:var(--green);border:1px solid rgba(0,201,122,0.2);}
.rank-hero.fiable{background:rgba(26,79,255,0.1);color:#6b8fff;border:1px solid rgba(26,79,255,0.2);}
.rank-hero.pilier{background:linear-gradient(135deg,rgba(252,209,22,0.15),rgba(26,79,255,0.15));color:var(--yellow);border:1px solid rgba(252,209,22,0.3);}

/* BADGE RÉACTIVITÉ PROFIL */
.reactivity-hero{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:700;font-family:'Syne',sans-serif;border-radius:20px;padding:4px 12px;}
.reactivity-hero.fast{background:rgba(0,201,122,0.08);color:var(--green);border:1px solid rgba(0,201,122,0.2);}
.reactivity-hero.normal{background:rgba(252,209,22,0.08);color:var(--yellow);border:1px solid rgba(252,209,22,0.2);}
.reactivity-hero.slow{background:rgba(255,100,60,0.08);color:#ff7a55;border:1px solid rgba(255,100,60,0.18);}

/* SECTION TÉMOIGNAGES */
.testimonials-section{margin-top:16px;}
.community-phrase{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px 16px;margin-bottom:12px;font-size:13px;color:var(--text-2);line-height:1.6;font-style:italic;}
.community-phrase strong{color:var(--green);font-style:normal;}
.community-indicators{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px;}
.indicator-chip{display:flex;align-items:center;gap:5px;padding:5px 10px;border-radius:20px;font-size:11px;font-family:'Syne',sans-serif;font-weight:700;}
.indicator-chip.green{background:rgba(0,201,122,0.1);color:var(--green);border:1px solid rgba(0,201,122,0.2);}
.indicator-chip.yellow{background:rgba(252,209,22,0.1);color:var(--yellow);border:1px solid rgba(252,209,22,0.2);}
.indicator-chip.blue{background:rgba(26,79,255,0.1);color:#6b8fff;border:1px solid rgba(26,79,255,0.2);}
.reliability-badge{display:inline-flex;align-items:center;gap:5px;padding:4px 12px;border-radius:20px;font-size:11px;font-family:'Syne',sans-serif;font-weight:700;margin-bottom:8px;}
.reliability-badge.green{background:rgba(0,201,122,0.1);color:var(--green);border:1px solid rgba(0,201,122,0.2);}
.reliability-badge.yellow{background:rgba(252,209,22,0.1);color:var(--yellow);border:1px solid rgba(252,209,22,0.2);}
.reliability-badge.orange{background:rgba(255,100,50,0.1);color:#ff6432;border:1px solid rgba(255,100,50,0.2);}
.testimonials-title{font-family:'Syne',sans-serif;font-size:14px;font-weight:700;color:var(--text-2);margin-bottom:12px;display:flex;align-items:center;gap:8px;}
.testimonials-title span{font-size:11px;color:var(--text-3);font-family:'Inter',sans-serif;font-weight:400;}
.testimonial-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px 16px;margin-bottom:10px;position:relative;}
.testimonial-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:2px;background:linear-gradient(180deg,var(--green),var(--blue));border-radius:2px 0 0 2px;}
.testimonial-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.testimonial-from{font-size:12px;font-weight:500;color:var(--text-2);}
.testimonial-stars{color:var(--yellow);font-size:12px;letter-spacing:-1px;}
.testimonial-text{font-size:13px;color:var(--text);line-height:1.6;font-style:italic;}
.testimonial-date{font-size:10px;color:var(--text-3);margin-top:6px;}
.no-testimonial{text-align:center;padding:30px 20px;color:var(--text-3);font-size:13px;background:var(--card);border:1px solid var(--border);border-radius:12px;}
</style>

</nav> <div class="overlay" id="phoneOverlay" onclick="closeOnOverlay(event,'phoneOverlay')"> <div class="sheet"> <div class="sheet-handle-row"><div class="sheet-handle"></div></div> <div class="sheet-title">Vérifier mon numéro</div> <div class="phone-step active" id="step-phone"> <p style="font-size:13px;color:var(--text-3);margin-bottom:16px;">Un code SMS sera envoyé à ton numéro.</p> <div class="form-group"> <label class="form-label">Numéro de téléphone</label> <input class="form-input" type="tel" id="phone-input" placeholder="+33 6 12 34 56 78" inputmode="tel"> </div> <button class="btn-primary" id="btn-send-otp" onclick="sendOtp()">Envoyer le code</button> <button class="btn-cancel" onclick="closeSheet('phoneOverlay')">Annuler</button> <div class="msg" id="msg-phone"></div> </div> <div class="phone-step" id="step-otp"> <p style="font-size:13px;color:var(--text-3);margin-bottom:16px;">Entre le code à 6 chiffres reçu par SMS.</p> <div class="otp-wrap"> <input class="otp-digit" maxlength="1" inputmode="numeric" oninput="otpNext(this,0)" onkeydown="otpBack(event,this,0)" onpaste="otpPaste(event)"> <input class="otp-digit" maxlength="1" inputmode="numeric" oninput="otpNext(this,1)" onkeydown="otpBack(event,this,1)"> <input class="otp-digit" maxlength="1" inputmode="numeric" oninput="otpNext(this,2)" onkeydown="otpBack(event,this,2)"> <input class="otp-digit" maxlength="1" inputmode="numeric" oninput="otpNext(this,3)" onkeydown="otpBack(event,this,3)"> <input class="otp-digit" maxlength="1" inputmode="numeric" oninput="otpNext(this,4)" onkeydown="otpBack(event,this,4)"> <input class="otp-digit" maxlength="1" inputmode="numeric" oninput="otpNext(this,5)" onkeydown="otpBack(event,this,5)"> </div> <button class="btn-primary" id="btn-verify-otp" onclick="verifyOtp()">Vérifier</button> <button class="btn-cancel" onclick="closeSheet('phoneOverlay')">Annuler</button> <div class="msg" id="msg-otp"></div> </div> </div>
</div> <script>
const API = 'https://tdoli-backend.onrender.com';
const token = localStorage.getItem('tdoli_token');
const email = localStorage.getItem('tdoli_email');
const username = localStorage.getItem('tdoli_username') || email?.split('@')[0] || '?';

if (!token) { window.location.replace('/tdoli-auth.html'); }

// ── Avatar immédiat depuis localStorage ────────────────────────
function getInitials(n){const p=(n||'?').trim().split(' ').filter(x=>x.length>0);return p.length>=2?(p[0][0]+p[p.length-1][0]).toUpperCase():(n||'??').substring(0,2).toUpperCase();}
(function(){
  const btn=document.getElementById('avatarBtn');
  const av=localStorage.getItem('tdoli_avatar');
  const ini=getInitials(username);
  if(btn) btn.innerHTML=av?'<img src="'+av+'" alt="'+ini+'">':ini;
})();

function shareApp(){
  const ref=localStorage.getItem('tdoli_ref')||username;
  const msg='🦜 TDOLI\nhttps://tdoli-frontend.pages.dev\nCode parrain: '+ref;
  if(navigator.share) navigator.share({title:'TDOLI',text:msg}).catch(()=>{});
  else navigator.clipboard.writeText(msg).then(()=>showToast('Lien copié ! 🎁','#fcd116')).catch(()=>{});
}
function closeSheet(id){document.getElementById(id).classList.remove('open');}
function closeOnOverlay(e,id){if(e.target===document.getElementById(id))closeSheet(id);}
function showMsg(id,text,type){const el=document.getElementById(id);el.className='msg '+(type||'error')+' show';el.textContent=text;}
function showToast(msg,color){const t=document.createElement('div');t.textContent=msg;t.style.cssText='position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:'+(color||'var(--green-dim)')+';color:#fff;font-family:Syne,sans-serif;font-size:13px;font-weight:700;padding:11px 22px;border-radius:30px;z-index:500;white-space:nowrap;box-shadow:0 4px 20px rgba(0,0,0,0.4);';document.body.appendChild(t);setTimeout(()=>t.remove(),3000);}

// ── safeJson : jamais de crash sur réponse HTML ────────────────
async function safeJson(res){
  const text=await res.text();
  try{return{ok:res.ok,status:res.status,data:JSON.parse(text)};}
  catch(e){return{ok:false,status:res.status,data:null,raw:text.substring(0,100)};}
}

// ── Essayer plusieurs routes (backend peut avoir /profile ou /user/me) ──
async function fetchProfile() {
  // Routes à tester dans l'ordre
  const routes = ['/profile/'+email, '/user/me', '/users/me'];
  for (const route of routes) {
    try {
      const r = await safeJson(await fetch(API+route, {
        headers:{'Authorization':'Bearer '+token},
        signal: AbortSignal.timeout(8000)
      }));
      if (r.ok && r.data && (r.data.email || r.data.username || r.data._id || r.data.totalDeals !== undefined)) {
        console.log('[TDOLI] Route profil OK:', route);
        return r.data;
      }
      if (r.status === 401) { localStorage.clear(); window.location.replace('/tdoli-auth.html'); return null; }
    } catch(e) { /* timeout ou réseau, continuer */ }
  }
  return null;
}

async function fetchMyTransfers() {
  const routes = ['/transfers'];
  for (const route of routes) {
    try {
      const r = await safeJson(await fetch(API+route, {
        headers:{'Authorization':'Bearer '+token},
        signal: AbortSignal.timeout(5000)
      }));
      if (r.ok && Array.isArray(r.data)) return r.data;
    } catch(e) {}
  }
  return [];
}

function getLevelInfo(level){
  const info={1:{label:'📧 Niveau 1',limit:'300 €',cls:'badge-level1'},2:{label:'📱 Niveau 2',limit:'500 €',cls:'badge-level2'},3:{label:'🪪 Niveau 3',limit:'1 000 €',cls:'badge-level2'},4:{label:'✅ Niveau 4',limit:'Illimité',cls:'badge-level2'}};
  return info[level]||info[1];
}

function communityRank(score) {
  if (score === null || score === undefined) return null;
  if (score >= 86) return { cls: 'pilier', label: 'Pilier 🏆' };
  if (score >= 66) return { cls: 'fiable', label: 'Membre fiable' };
  if (score >= 41) return { cls: 'actif',  label: 'Membre actif' };
  return { cls: 'nouveau', label: 'Nouveau membre' };
}

function renderReactivityHero(badge) {
  if (!badge) return '';
  const map = { fast: ['⚡', 'Très réactif'], normal: ['🕐', 'Réactif'], slow: ['🐢', 'Peu réactif'] };
  const [icon, label] = map[badge] || [];
  return `<span class="reactivity-hero ${badge}">${icon} ${label}</span>`;
}

function timeAgoShort(dateStr) {
  if (!dateStr) return '';
  const diff = Date.now() - new Date(dateStr).getTime();
  const d = Math.floor(diff / 86400000);
  if (d < 1) return "Aujourd'hui";
  if (d < 7) return `Il y a ${d}j`;
  if (d < 30) return `Il y a ${Math.floor(d/7)} sem.`;
  return `Il y a ${Math.floor(d/30)} mois`;
}

async function fetchTestimonials(userId) {
  if (!userId) return [];
  try {
    const r = await safeJson(await fetch(API + '/ratings/' + userId + '/testimonials', {
      headers: { 'Authorization': 'Bearer ' + token },
      signal: AbortSignal.timeout(5000)
    }));
    if (r.ok && r.data && Array.isArray(r.data.testimonials)) return r.data.testimonials;
  } catch(e) {}
  return [];
}

function renderTestimonials(testimonials) {
  const section = document.getElementById('testimonialsSection');
  if (!section) return;
  if (!testimonials || testimonials.length === 0) {
    section.innerHTML = `
      <div class="testimonials-title">💬 Ce que disent les membres</div> <div class="no-testimonial">Aucun témoignage pour l'instant.<br>Complete des deals pour recevoir tes premiers avis.</div>`;
    return;
  }
  section.innerHTML = `
    <div class="testimonials-title">💬 Ce que disent les membres <span>(${testimonials.length})</span></div> ${testimonials.map(t => `
      <div class="testimonial-card"> <div class="testimonial-header"> <span class="testimonial-from">👤 ${t.fromUsername || 'Membre'}</span> <span class="testimonial-stars">${'★'.repeat(t.rating || 0)}${'☆'.repeat(5 - (t.rating || 0))}</span> </div> <div class="testimonial-text">"${t.comment}"</div> <div class="testimonial-date">${timeAgoShort(t.createdAt)}</div> </div>`).join('')}`;
}

// ── Phase 5 — Phrase communautaire personnalisée ─────────────
function communityPhrase(user) {
  const name = (user.username || user.firstName || 'Ce membre').split(' ')[0];
  const deals = user.completedDeals || 0;
  const since = user.createdAt ? new Date(user.createdAt).toLocaleDateString('fr-FR', {month:'long', year:'numeric'}) : null;
  const sinceStr = since ? ` depuis <strong>${since}</strong>` : '';
  if (deals === 0) return `<div class="community-phrase">${name} fait partie de la communauté TDOLI${sinceStr}. Bienvenue !</div>`;
  return `<div class="community-phrase">${name} fait partie de la communauté TDOLI${sinceStr}. Il a aidé <strong>${deals} membre${deals>1?'s':''}</strong> de la diaspora.</div>`;
}

function communityIndicators(user) {
  const chips = [];
  const deals = user.completedDeals || 0;
  if (deals > 0) chips.push('<div class="indicator-chip green">🤝 ' + deals + ' membre' + (deals>1?'s':'') + ' aidé' + (deals>1?'s':'') + '</div>');
  if (user.reactivityBadge === 'fast') chips.push('<div class="indicator-chip yellow">⚡ Répond vite</div>');
  else if (user.reactivityBadge === 'normal') chips.push('<div class="indicator-chip yellow">🕐 Répond en 1h</div>');
  if (user.averageRating >= 4) chips.push('<div class="indicator-chip blue">⭐ Très bien noté</div>');
  else if (user.averageRating >= 3) chips.push('<div class="indicator-chip blue">⭐ Bien noté</div>');
  // Actif cette semaine
  if (user.lastResponseAt) {
    const daysSince = (Date.now() - new Date(user.lastResponseAt).getTime()) / (1000*60*60*24);
    if (daysSince < 7) chips.push('<div class="indicator-chip green">🟢 Actif cette semaine</div>');
  }
  if (chips.length === 0) return '';
  return '<div class="community-indicators">' + chips.join('') + '</div>';
}

function reliabilityBadge(user) {
  const abandoned = user.abandonCount || 0;
  const completed = user.completedDeals || 0;
  const total = completed + abandoned;
  if (total === 0) return '<div class="reliability-badge orange">🟠 Nouveau membre</div>';
  const rate = completed / total;
  if (rate >= 0.85 && completed >= 3) return '<div class="reliability-badge green">🟢 Membre actif et fiable</div>';
  if (rate >= 0.5 || completed >= 1) return '<div class="reliability-badge yellow">🟡 Membre actif</div>';
  return '<div class="reliability-badge orange">🟠 Nouveau membre</div>';
}

async function loadProfile() {
  // 1. Affichage immédiat depuis cache (pas de loading spinner)
  renderFromCache();

  const wakeTimer = null;

  // 3. Charger depuis API avec retry
  let user = null;
  let attempts = 0;
  while (!user && attempts < 3) {
    attempts++;
    user = await fetchProfile();
    if (!user && attempts < 3) await new Promise(r => setTimeout(r, 5000));
  }


  if (!user) {
    // Afficher quand même le profil depuis cache avec message discret
    document.getElementById('profileContent').innerHTML += '<div style="text-align:center;font-size:11px;color:var(--text-3);padding:8px;">Données hors ligne — reconnecte-toi pour actualiser</div>';
    return;
  }

  const txs = await fetchMyTransfers();
  renderFull(user, txs);
}

function logout(){
  localStorage.clear();
  if ('caches' in window) {
    caches.keys().then(keys => keys.forEach(k => caches.delete(k)));
  }
  window.location.replace('/tdoli-auth.html');
}
function openPhoneVerif(){document.getElementById('step-phone').classList.add('active');document.getElementById('step-otp').classList.remove('active');document.getElementById('phoneOverlay').classList.add('open');}
function otpNext(el, index) {
  // Garder uniquement le dernier chiffre saisi
  el.value = el.value.replace(/\D/g, '').slice(-1);
  if (el.value.length === 1 && index < 5) {
    document.querySelectorAll('.otp-digit')[index + 1].focus();
  }
}
function otpBack(e, el, index) {
  if (e.key === 'Backspace') {
    if (el.value) {
      el.value = '';
    } else if (index > 0) {
      const prev = document.querySelectorAll('.otp-digit')[index - 1];
      prev.value = '';
      prev.focus();
    }
  } else if (e.key === 'ArrowLeft' && index > 0) {
    document.querySelectorAll('.otp-digit')[index - 1].focus();
  } else if (e.key === 'ArrowRight' && index < 5) {
    document.querySelectorAll('.otp-digit')[index + 1].focus();
  }
}
function otpPaste(e) {
  e.preventDefault();
  const pasted = (e.clipboardData || window.clipboardData).getData('text').replace(/\D/g, '').slice(0, 6);
  const digits = document.querySelectorAll('.otp-digit');
  pasted.split('').forEach((d, i) => { if (digits[i]) digits[i].value = d; });
  const last = Math.min(pasted.length, 5);
  digits[last].focus();
  if (pasted.length === 6) verifyOtp();
}

async function sendOtp(){
  const phone=document.getElementById('phone-input').value.trim();
  if(!phone){showMsg('msg-phone','Entre ton numéro');return;}
  const btn=document.getElementById('btn-send-otp');btn.disabled=true;btn.innerHTML='<span class="spinner"></span>';
  try{
    const r=await safeJson(await fetch(API+'/auth/send-sms',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},body:JSON.stringify({phone})}));
    if(r.ok){document.getElementById('step-phone').classList.remove('active');document.getElementById('step-otp').classList.add('active');document.querySelectorAll('.otp-digit')[0].focus();}
    else showMsg('msg-phone',(r.data&&r.data.message)||'Erreur envoi');
  }catch(e){showMsg('msg-phone','Serveur inaccessible');}
  btn.disabled=false;btn.innerHTML='Envoyer le code';
}

async function verifyOtp(){
  const code=Array.from(document.querySelectorAll('.otp-digit')).map(i=>i.value).join('');
  if(code.length<6){showMsg('msg-otp','Code incomplet');return;}
  const phone=document.getElementById('phone-input').value.trim();
  const btn=document.getElementById('btn-verify-otp');btn.disabled=true;btn.innerHTML='<span class="spinner"></span>';
  try{
    const r=await safeJson(await fetch(API+'/auth/verify-sms',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},body:JSON.stringify({code,phone})}));
    if(r.ok){
      closeSheet('phoneOverlay');
      showToast('Téléphone vérifié ! Niveau 2 atteint 🎉');
      setTimeout(() => window.location.reload(), 1500);
    }
    else showMsg('msg-otp',(r.data&&r.data.message)||'Code incorrect');
  }catch(e){showMsg('msg-otp','Serveur inaccessible');}
  btn.disabled=false;btn.innerHTML='Vérifier';
}

loadProfile();

// ── Phase 8 — Face ID depuis le profil ────────────────────────
async function toggleFaceID() {
  const isActive = localStorage.getItem('tdoli_faceid_active') === '1';
  if (isActive) {
    localStorage.removeItem('tdoli_faceid_active');
    localStorage.removeItem('tdoli_faceid_dismissed');
    const el = document.getElementById('faceid-status');
    if (el) el.textContent = 'Désactivé →';
    showToast('Face ID désactivé');
    return;
  }
  if (!window.PublicKeyCredential) { showToast('Face ID non supporté sur cet appareil'); return; }
  try {
    const optRes = await fetch(API + '/webauthn/register/options', {
      method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token }
    });
    if (!optRes.ok) throw new Error('options_failed');
    const options = await optRes.json();
    options.challenge = base64urlToBuffer(options.challenge);
    options.user.id   = base64urlToBuffer(options.user.id);
    options.excludeCredentials = (options.excludeCredentials || []).map(c => ({ ...c, id: base64urlToBuffer(c.id) }));
    const credential = await navigator.credentials.create({ publicKey: options });
    const regResponse = {
      id: bufferToBase64url(credential.rawId), rawId: bufferToBase64url(credential.rawId), type: credential.type,
      response: {
        attestationObject: bufferToBase64url(credential.response.attestationObject),
        clientDataJSON:    bufferToBase64url(credential.response.clientDataJSON),
        transports:        credential.response.getTransports?.() || [],
      }
    };
    const verRes = await fetch(API + '/webauthn/register/verify', {
      method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
      body: JSON.stringify(regResponse)
    });
    if (verRes.ok) {
      localStorage.setItem('tdoli_faceid_active', '1');
      const el = document.getElementById('faceid-status');
      if (el) el.textContent = 'Activé ✅';
      showToast('Face ID activé ! 🔐');
    } else {
      showToast('Activation échouée');
    }
  } catch(err) { if(err.name !== 'NotAllowedError') showToast('Erreur — réessaie'); }
}

function base64urlToBuffer(b){const s=b.replace(/-/g,'+').replace(/_/g,'/');const bin=atob(s);const buf=new Uint8Array(bin.length);for(let i=0;i<bin.length;i++)buf[i]=bin.charCodeAt(i);return buf.buffer;}
function bufferToBase64url(b){const bytes=new Uint8Array(b);let bin='';for(const x of bytes)bin+=String.fromCharCode(x);return btoa(bin).replace(/\+/g,'-').replace(/\//g,'_').replace(/=/g,'');}
