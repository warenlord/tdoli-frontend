<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>TDOLI — Mes Bénéficiaires</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#060d09;--surface:#0c1710;--card:#111e15;--green:#00c97a;--green-dim:#009e60;--green-glow:rgba(0,201,122,0.12);--yellow:#fcd116;--blue:#1a4fff;--red:#ff4444;--text:#e8f2eb;--text-2:#a8bfad;--text-3:#5a7560;--border:rgba(255,255,255,0.07);--border-active:rgba(0,201,122,0.2);--r:16px;}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:100px;overflow-x:hidden;}
.topbar{position:sticky;top:0;z-index:100;background:rgba(6,13,9,0.95);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:12px 20px;display:flex;align-items:center;gap:12px;}
.back-btn{width:36px;height:36px;border-radius:50%;background:var(--surface);border:1px solid var(--border);color:var(--text);font-size:16px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;text-decoration:none;}
.topbar-title{font-family:'Syne',sans-serif;font-size:16px;font-weight:800;flex:1;}
.content{padding:16px 20px;max-width:480px;margin:0 auto;}
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;margin-top:8px;}
.section-title{font-family:'Syne',sans-serif;font-size:14px;font-weight:700;color:var(--text-2);}
.btn-add{display:flex;align-items:center;gap:6px;padding:7px 14px;background:var(--green-glow);color:var(--green);border:1px solid var(--border-active);border-radius:20px;font-family:'Syne',sans-serif;font-size:12px;font-weight:700;cursor:pointer;}
.benef-list{display:flex;flex-direction:column;gap:8px;margin-bottom:20px;}
.benef-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px 16px;display:flex;align-items:center;gap:12px;position:relative;overflow:hidden;}
.benef-card.type-moi::before{content:'';position:absolute;left:0;top:0;bottom:0;width:2px;background:var(--blue);}
.benef-card.type-beneficiaire::before{content:'';position:absolute;left:0;top:0;bottom:0;width:2px;background:var(--green);}
.benef-avatar{width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,var(--green-dim),var(--blue));display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-size:14px;font-weight:800;color:#fff;flex-shrink:0;}
.benef-avatar.moi{background:linear-gradient(135deg,var(--blue),#0d2db3);}
.benef-body{flex:1;min-width:0;}
.benef-name{font-size:14px;font-weight:600;margin-bottom:3px;}
.benef-detail{font-size:12px;color:var(--text-3);}
.benef-method{font-size:10px;font-family:'Syne',sans-serif;font-weight:700;padding:2px 8px;border-radius:10px;display:inline-block;margin-top:3px;}
.benef-method.mobilemoney{background:rgba(0,201,122,0.1);color:var(--green);}
.benef-method.virement{background:rgba(26,79,255,0.1);color:var(--blue);}
.benef-method.paypal{background:rgba(252,209,22,0.1);color:var(--yellow);}
.benef-actions{display:flex;gap:6px;flex-shrink:0;}
.btn-icon{width:32px;height:32px;border-radius:50%;border:1px solid var(--border);background:var(--surface);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:13px;}
.btn-icon.del{border-color:rgba(255,68,68,0.2);color:var(--red);}
.empty-state{text-align:center;padding:40px 20px;color:var(--text-3);font-size:13px;line-height:1.6;}
.empty-icon{font-size:36px;margin-bottom:12px;}
.loading-wrap{display:flex;justify-content:center;padding:40px;}
.loader{width:24px;height:24px;position:relative;}
.loader::before,.loader::after{content:'';position:absolute;inset:0;border-radius:50%;border:2px solid transparent;animation:spin 1s linear infinite;}
.loader::before{border-top-color:var(--green);}.loader::after{border-bottom-color:var(--blue);animation-duration:1.5s;animation-direction:reverse;}
@keyframes spin{to{transform:rotate(360deg);}}
/* Sheet */
.overlay{position:fixed;inset:0;z-index:300;background:rgba(0,0,0,0.65);backdrop-filter:blur(8px);display:none;align-items:flex-end;}
.overlay.open{display:flex;}
.sheet{background:var(--card);border:1px solid var(--border);border-top:1px solid var(--border-active);border-radius:22px 22px 0 0;padding:0 22px 48px;width:100%;max-width:480px;margin:0 auto;animation:slideUp 0.35s cubic-bezier(0.19,1,0.22,1);max-height:90vh;overflow-y:auto;}
@keyframes slideUp{from{transform:translateY(100%);opacity:0;}to{transform:translateY(0);opacity:1;}}
.sheet-handle-row{padding:16px 0 18px;display:flex;justify-content:center;position:sticky;top:0;background:var(--card);z-index:1;}
.sheet-handle{width:34px;height:3px;border-radius:2px;background:var(--border);}
.sheet-title{font-family:'Syne',sans-serif;font-size:18px;font-weight:800;margin-bottom:6px;}
.sheet-sub{font-size:13px;color:var(--text-3);margin-bottom:20px;line-height:1.5;}
.type-toggle{display:flex;gap:8px;margin-bottom:18px;}
.type-btn{flex:1;padding:10px;border-radius:10px;background:var(--surface);border:1px solid var(--border);font-family:'Syne',sans-serif;font-size:12px;font-weight:700;color:var(--text-3);cursor:pointer;text-align:center;transition:all 0.2s;}
.type-btn.active{background:var(--green-glow);border-color:var(--border-active);color:var(--green);}
.type-btn.active.moi{background:rgba(26,79,255,0.1);border-color:rgba(26,79,255,0.3);color:var(--blue);}
.method-tabs{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap;}
.method-tab{padding:7px 14px;background:var(--surface);border:1px solid var(--border);border-radius:20px;font-family:'Syne',sans-serif;font-size:11px;font-weight:700;color:var(--text-3);cursor:pointer;transition:all 0.2s;}
.method-tab.active{background:var(--green-glow);border-color:var(--border-active);color:var(--green);}
.method-fields{display:none;}.method-fields.show{display:block;}
.form-group{margin-bottom:14px;}
.form-label{display:block;font-size:11px;font-weight:500;color:var(--text-3);margin-bottom:7px;letter-spacing:1px;text-transform:uppercase;}
.form-input,.form-select{width:100%;padding:13px 14px;background:var(--surface);border:1px solid var(--border);border-radius:12px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:15px;-webkit-appearance:none;transition:all 0.2s;}
.form-input:focus,.form-select:focus{outline:none;border-color:var(--green);box-shadow:0 0 0 3px var(--green-glow);}
.btn-primary{width:100%;padding:15px;background:linear-gradient(135deg,var(--green-dim) 0%,#004d2a 50%,#001a6e 100%);color:#fff;border:none;border-radius:13px;font-family:'Syne',sans-serif;font-size:14px;font-weight:700;cursor:pointer;position:relative;overflow:hidden;margin-top:6px;}
.btn-primary::after{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,var(--green),var(--yellow),var(--blue));}
.btn-primary:disabled{opacity:0.35;}
.btn-cancel{width:100%;padding:13px;background:transparent;color:var(--text-3);border:1px solid var(--border);border-radius:13px;font-family:'Syne',sans-serif;font-size:13px;font-weight:600;cursor:pointer;margin-top:8px;}
.msg{display:none;padding:11px 14px;border-radius:10px;font-size:13px;margin-top:12px;}
.msg.error{background:rgba(255,68,68,0.08);border:1px solid rgba(255,68,68,0.2);color:#ff6b6b;}
.msg.success{background:rgba(0,201,122,0.08);border:1px solid rgba(0,201,122,0.2);color:var(--green);}
.msg.show{display:block;}
.spinner{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,0.2);border-top-color:#fff;border-radius:50%;animation:spin 0.5s linear infinite;vertical-align:middle;margin-right:6px;}
.toast{position:fixed;bottom:40px;left:50%;transform:translateX(-50%) translateY(8px);color:#fff;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;padding:11px 22px;border-radius:30px;z-index:500;opacity:0;pointer-events:none;white-space:nowrap;transition:opacity 0.25s,transform 0.25s;box-shadow:0 4px 20px rgba(0,0,0,0.4);}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
<link rel="manifest" href="/manifest.json">
<script>if('serviceWorker' in navigator){window.addEventListener('load',()=>{navigator.serviceWorker.register('/service-worker.js').catch(()=>{});});}</script>
</head>
<body>

<div class="topbar">
  <a href="/tdoli-profile.html" class="back-btn">←</a>
  <div class="topbar-title">Mes Bénéficiaires</div>
  <button class="btn-add" onclick="openSheet()">+ Ajouter</button>
</div>

<div class="content">
  <!-- Section MOI -->
  <div class="section-header">
    <div class="section-title">🙋 Moi — Mes coordonnées</div>
  </div>
  <div id="listMoi"><div class="loading-wrap"><div class="loader"></div></div></div>

  <!-- Section Bénéficiaires -->
  <div class="section-header" style="margin-top:8px;">
    <div class="section-title">👥 Mes bénéficiaires</div>
  </div>
  <div id="listBenef"><div class="loading-wrap"><div class="loader"></div></div></div>
</div>

<!-- Sheet ajouter/modifier -->
<div class="overlay" id="formOverlay" onclick="closeOnOverlay(event,'formOverlay')">
  <div class="sheet">
    <div class="sheet-handle-row"><div class="sheet-handle"></div></div>
    <div class="sheet-title" id="formTitle">Nouveau bénéficiaire</div>
    <div class="sheet-sub" id="formSub">Ajoute les coordonnées de paiement.</div>

    <!-- Type : Moi ou Bénéficiaire -->
    <div class="type-toggle">
      <div class="type-btn active" id="typeBtn-benef" onclick="setType('beneficiaire')">👥 Bénéficiaire</div>
      <div class="type-btn moi" id="typeBtn-moi" onclick="setType('moi')">🙋 Moi</div>
    </div>

    <!-- Nom -->
    <div class="form-group">
      <label class="form-label" id="nomLabel">Nom du bénéficiaire</label>
      <input class="form-input" type="text" id="f-nom" placeholder="Ex: Maman, Jean Dupont…">
    </div>

    <!-- Pays -->
    <div class="form-group">
      <label class="form-label">Pays</label>
      <select class="form-select" id="f-pays">
        <option value="">Sélectionner…</option>
        <option value="Gabon">🇬🇦 Gabon</option>
        <option value="France">🇫🇷 France</option>
        <option value="Burkina Faso">🇧🇫 Burkina Faso</option>
        <option value="Belgique">🇧🇪 Belgique</option>
        <option value="Suisse">🇨🇭 Suisse</option>
        <option value="Canada">🇨🇦 Canada</option>
        <option value="Etats-Unis">🇺🇸 États-Unis</option>
      </select>
    </div>

    <!-- Méthode -->
    <div class="form-group">
      <label class="form-label">Méthode de paiement</label>
      <div class="method-tabs">
        <div class="method-tab active" onclick="setMethodForm('mobilemoney',this)">📱 Mobile Money</div>
        <div class="method-tab" onclick="setMethodForm('virement',this)">🏦 Virement</div>
        <div class="method-tab" onclick="setMethodForm('paypal',this)">💳 PayPal</div>
      </div>
    </div>

    <!-- Mobile Money -->
    <div class="method-fields show" id="ff-mobilemoney">
      <div class="form-group">
        <label class="form-label">Numéro Mobile Money</label>
        <input class="form-input" type="tel" id="f-phone" placeholder="+241 06 00 00 00" inputmode="tel">
      </div>
      <div class="form-group">
        <label class="form-label">Opérateur</label>
        <select class="form-select" id="f-operateur">
          <option value="">Sélectionner…</option>
          <option value="Airtel Money">Airtel Money</option>
          <option value="Moov Money">Moov Money</option>
          <option value="Orange Money">Orange Money</option>
        </select>
      </div>
    </div>

    <!-- Virement -->
    <div class="method-fields" id="ff-virement">
      <div class="form-group">
        <label class="form-label">IBAN</label>
        <input class="form-input" type="text" id="f-iban" placeholder="FR76 3000 6000 0112 3456 7890 189">
      </div>
      <div class="form-group">
        <label class="form-label">Banque</label>
        <input class="form-input" type="text" id="f-banque" placeholder="BNP, Société Générale…">
      </div>
    </div>

    <!-- PayPal -->
    <div class="method-fields" id="ff-paypal">
      <div class="form-group">
        <label class="form-label">Email PayPal</label>
        <input class="form-input" type="email" id="f-paypal" placeholder="ton@email.com">
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">Note (optionnel)</label>
      <input class="form-input" type="text" id="f-note" placeholder="Ex: Envoyer en semaine">
    </div>

    <button class="btn-primary" id="btn-save" onclick="saveBenef()">Enregistrer</button>
    <button class="btn-cancel" onclick="closeSheet('formOverlay')">Annuler</button>
    <div class="msg" id="msg-form"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API = 'https://tdoli-backend.onrender.com';
const token = localStorage.getItem('tdoli_token');
if (!token) window.location.replace('/tdoli-auth.html');

let allBenef = [];
let editingId = null;
let currentType = 'beneficiaire';
let currentMethod = 'mobilemoney';

// ── Helpers ────────────────────────────────────────────────────
async function safeJson(res) {
  const text = await res.text();
  try { return { ok: res.ok, status: res.status, data: JSON.parse(text) }; }
  catch(e) { return { ok: false, status: res.status, data: null }; }
}

function showToast(msg, color) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.style.background = color || 'var(--green-dim)';
  t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 3000);
}
function showMsg(id, text, type) {
  const el = document.getElementById(id);
  el.className = 'msg ' + (type || 'error') + ' show';
  el.textContent = text;
}
function closeSheet(id) { document.getElementById(id).classList.remove('open'); }
function closeOnOverlay(e, id) { if(e.target === document.getElementById(id)) closeSheet(id); }

function getMethodLabel(m) {
  if(m === 'mobilemoney') return 'Mobile Money';
  if(m === 'virement') return 'Virement';
  if(m === 'paypal') return 'PayPal';
  return m;
}

function getInitials(name) {
  const p = (name||'?').trim().split(' ').filter(x=>x.length>0);
  return p.length>=2 ? (p[0][0]+p[p.length-1][0]).toUpperCase() : (name||'??').substring(0,2).toUpperCase();
}

function renderCard(b) {
  const ini = getInitials(b.nom);
  let detail = '';
  if(b.phone) detail = b.phone + (b.operateur ? ' · ' + b.operateur : '');
  else if(b.iban) detail = b.iban.substring(0,12) + '…' + (b.banque ? ' · ' + b.banque : '');
  else if(b.paypal) detail = b.paypal;
  if(b.pays) detail += (detail ? ' · ' : '') + b.pays;

  return `<div class="benef-card type-${b.type}" id="card-${b._id}">
    <div class="benef-avatar ${b.type === 'moi' ? 'moi' : ''}">${ini}</div>
    <div class="benef-body">
      <div class="benef-name">${b.nom}</div>
      <div class="benef-detail">${detail}</div>
      <span class="benef-method ${b.methode}">${getMethodLabel(b.methode)}</span>
    </div>
    <div class="benef-actions">
      <div class="btn-icon" onclick="editBenef('${b._id}')">✏️</div>
      <div class="btn-icon del" onclick="deleteBenef('${b._id}')">🗑</div>
    </div>
  </div>`;
}

function renderLists() {
  const moi = allBenef.filter(b => b.type === 'moi');
  const benef = allBenef.filter(b => b.type === 'beneficiaire');

  const listMoi = document.getElementById('listMoi');
  const listBenef = document.getElementById('listBenef');

  listMoi.innerHTML = moi.length > 0
    ? '<div class="benef-list">' + moi.map(renderCard).join('') + '</div>'
    : '<div class="empty-state"><div class="empty-icon">🙋</div>Ajoute tes coordonnées pour recevoir des paiements</div>';

  listBenef.innerHTML = benef.length > 0
    ? '<div class="benef-list">' + benef.map(renderCard).join('') + '</div>'
    : '<div class="empty-state"><div class="empty-icon">👥</div>Aucun bénéficiaire enregistré</div>';
}

async function loadBenef() {
  try {
    const r = await safeJson(await fetch(API + '/beneficiaires', {
      headers: { 'Authorization': 'Bearer ' + token }
    }));
    if(r.ok && Array.isArray(r.data)) {
      allBenef = r.data;
      renderLists();
    } else {
      document.getElementById('listMoi').innerHTML = '<div class="empty-state">Erreur de chargement</div>';
      document.getElementById('listBenef').innerHTML = '';
    }
  } catch(e) {
    document.getElementById('listMoi').innerHTML = '<div class="empty-state">Erreur réseau</div>';
    document.getElementById('listBenef').innerHTML = '';
  }
}

// ── Sheet form ─────────────────────────────────────────────────
function setType(type) {
  currentType = type;
  document.getElementById('typeBtn-benef').classList.toggle('active', type === 'beneficiaire');
  document.getElementById('typeBtn-moi').classList.toggle('active', type === 'moi');
  document.getElementById('nomLabel').textContent = type === 'moi' ? 'Mon nom complet' : 'Nom du bénéficiaire';
}

function setMethodForm(method, el) {
  currentMethod = method;
  document.querySelectorAll('.method-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  document.querySelectorAll('.method-fields').forEach(f => f.classList.remove('show'));
  document.getElementById('ff-' + method).classList.add('show');
}

function resetForm() {
  editingId = null;
  currentType = 'beneficiaire';
  currentMethod = 'mobilemoney';
  document.getElementById('formTitle').textContent = 'Nouveau bénéficiaire';
  document.getElementById('formSub').textContent = 'Ajoute les coordonnées de paiement.';
  document.getElementById('typeBtn-benef').classList.add('active');
  document.getElementById('typeBtn-moi').classList.remove('active');
  document.getElementById('nomLabel').textContent = 'Nom du bénéficiaire';
  ['f-nom','f-phone','f-iban','f-banque','f-paypal','f-note'].forEach(id => {
    const el = document.getElementById(id);
    if(el) el.value = '';
  });
  document.getElementById('f-pays').value = '';
  document.getElementById('f-operateur').value = '';
  document.querySelectorAll('.method-tab').forEach((t,i) => t.classList.toggle('active', i===0));
  document.querySelectorAll('.method-fields').forEach((f,i) => f.classList.toggle('show', i===0));
  document.getElementById('msg-form').className = 'msg';
  document.getElementById('btn-save').innerHTML = 'Enregistrer';
  document.getElementById('btn-save').disabled = false;
}

function openSheet() {
  resetForm();
  document.getElementById('formOverlay').classList.add('open');
}

function editBenef(id) {
  const b = allBenef.find(x => x._id === id);
  if(!b) return;
  resetForm();
  editingId = id;
  document.getElementById('formTitle').textContent = 'Modifier';
  setType(b.type || 'beneficiaire');
  document.getElementById('f-nom').value = b.nom || '';
  document.getElementById('f-pays').value = b.pays || '';
  document.getElementById('f-note').value = b.note || '';

  // Méthode
  const methodEl = document.querySelector(`.method-tab[onclick*="${b.methode}"]`);
  if(methodEl) setMethodForm(b.methode, methodEl);

  if(b.methode === 'mobilemoney') {
    document.getElementById('f-phone').value = b.phone || '';
    document.getElementById('f-operateur').value = b.operateur || '';
  } else if(b.methode === 'virement') {
    document.getElementById('f-iban').value = b.iban || '';
    document.getElementById('f-banque').value = b.banque || '';
  } else if(b.methode === 'paypal') {
    document.getElementById('f-paypal').value = b.paypal || '';
  }

  document.getElementById('formOverlay').classList.add('open');
}

async function saveBenef() {
  const nom = document.getElementById('f-nom').value.trim();
  if(!nom) { showMsg('msg-form', 'Le nom est requis'); return; }

  const payload = {
    type: currentType,
    nom,
    methode: currentMethod,
    pays: document.getElementById('f-pays').value,
    note: document.getElementById('f-note').value.trim(),
    phone: document.getElementById('f-phone').value.trim(),
    operateur: document.getElementById('f-operateur').value,
    iban: document.getElementById('f-iban').value.trim(),
    banque: document.getElementById('f-banque').value.trim(),
    paypal: document.getElementById('f-paypal').value.trim(),
  };

  const btn = document.getElementById('btn-save');
  btn.disabled = true; btn.innerHTML = '<span class="spinner"></span>';

  const url = editingId ? API + '/beneficiaires/' + editingId : API + '/beneficiaires';
  const method = editingId ? 'PUT' : 'POST';

  const r = await safeJson(await fetch(url, {
    method,
    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
    body: JSON.stringify(payload)
  })).catch(() => ({ ok: false, data: null }));

  if(r.ok) {
    closeSheet('formOverlay');
    showToast(editingId ? 'Modifié ✓' : 'Ajouté ✓');
    loadBenef();
  } else {
    showMsg('msg-form', (r.data && r.data.message) || 'Erreur');
  }
  btn.disabled = false; btn.innerHTML = 'Enregistrer';
}

async function deleteBenef(id) {
  const b = allBenef.find(x => x._id === id);
  if(!confirm('Supprimer "' + (b ? b.nom : '') + '" ?')) return;
  const r = await safeJson(await fetch(API + '/beneficiaires/' + id, {
    method: 'DELETE',
    headers: { 'Authorization': 'Bearer ' + token }
  })).catch(() => ({ ok: false }));
  if(r.ok) { showToast('Supprimé'); loadBenef(); }
  else showToast('Erreur', '#ff4444');
}

loadBenef();
</script>
</body>
</html>
