<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TDOLI — Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#060d09;--surface:#0c1710;--card:#111e15;--green:#00c97a;--green-dim:#009e60;--green-glow:rgba(0,201,122,0.12);--yellow:#fcd116;--blue:#1a4fff;--red:#ff4444;--text:#e8f2eb;--text-2:#a8bfad;--text-3:#5a7560;--border:rgba(255,255,255,0.07);--border-active:rgba(0,201,122,0.2);--r:16px;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
.topbar{background:rgba(6,13,9,0.95);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:16px 24px;display:flex;align-items:center;justify-content:space-between;}
.topbar-logo{font-family:'Syne',sans-serif;font-weight:800;font-size:18px;}
.topbar-logo .l1{color:var(--green);}.topbar-logo .l2{color:var(--yellow);}.topbar-logo .l3{color:var(--green);}.topbar-logo .l4{color:var(--blue);}.topbar-logo .l5{color:var(--yellow);}
.admin-badge{background:rgba(252,209,22,0.1);color:var(--yellow);border:1px solid rgba(252,209,22,0.2);font-size:11px;font-weight:700;font-family:'Syne',sans-serif;padding:4px 12px;border-radius:20px;}
.logout-btn{padding:8px 16px;background:transparent;color:var(--text-3);border:1px solid var(--border);border-radius:8px;font-family:'Syne',sans-serif;font-size:12px;font-weight:700;cursor:pointer;}
#loginScreen{min-height:calc(100vh - 60px);display:flex;align-items:center;justify-content:center;padding:20px;}
.login-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:32px;max-width:360px;width:100%;text-align:center;}
.login-title{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;margin-bottom:8px;}
.login-sub{font-size:13px;color:var(--text-3);margin-bottom:24px;}
.form-input{width:100%;padding:14px 16px;background:var(--surface);border:1px solid var(--border);border-radius:12px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:16px;-webkit-appearance:none;transition:all 0.2s;margin-bottom:12px;}
.form-input:focus{outline:none;border-color:var(--green);}
.btn-primary{width:100%;padding:15px;background:linear-gradient(135deg,var(--green-dim) 0%,#004d2a 50%,#001a6e 100%);color:#fff;border:none;border-radius:12px;font-family:'Syne',sans-serif;font-size:14px;font-weight:700;cursor:pointer;position:relative;overflow:hidden;}
.btn-primary::after{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,var(--green),var(--yellow),var(--blue));}
.msg{padding:10px 14px;border-radius:8px;font-size:13px;margin-top:10px;display:none;}
.msg.error{background:rgba(255,68,68,0.08);border:1px solid rgba(255,68,68,0.2);color:#ff6b6b;display:block;}
#adminScreen{display:none;padding:20px 24px;max-width:1200px;margin:0 auto;}
.stats-row{display:flex;gap:12px;margin-bottom:24px;flex-wrap:wrap;}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px 20px;flex:1;min-width:120px;}
.stat-val{font-family:'Syne',sans-serif;font-size:24px;font-weight:800;margin-bottom:4px;}
.stat-val.yellow{color:var(--yellow);}.stat-val.green{color:var(--green);}.stat-val.blue{color:var(--blue);}
.stat-label{font-size:12px;color:var(--text-3);}
.section-title{font-family:'Syne',sans-serif;font-size:16px;font-weight:700;margin-bottom:16px;}
.filter-bar{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;}
.filter-btn{padding:7px 16px;background:var(--surface);border:1px solid var(--border);border-radius:20px;color:var(--text-3);font-family:'Syne',sans-serif;font-size:12px;font-weight:700;cursor:pointer;transition:all 0.2s;}
.filter-btn.active{background:var(--green-glow);border-color:var(--border-active);color:var(--green);}
.dispute-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:20px;margin-bottom:12px;position:relative;overflow:hidden;}
.dispute-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;}
.dispute-card.pending::before{background:var(--yellow);}
.dispute-card.reviewing::before{background:var(--blue);}
.dispute-card.resolved_sender::before,.dispute-card.resolved_receiver::before{background:var(--green);}
.dispute-card.cancelled::before{background:var(--text-3);}
.dispute-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:8px;}
.dispute-ref{font-size:12px;color:var(--text-3);font-family:'Syne',sans-serif;}
.dispute-date{font-size:11px;color:var(--text-3);}
.status-badge{font-size:11px;font-weight:700;font-family:'Syne',sans-serif;padding:4px 12px;border-radius:20px;}
.status-badge.pending{background:rgba(252,209,22,0.1);color:var(--yellow);border:1px solid rgba(252,209,22,0.2);}
.status-badge.reviewing{background:rgba(26,79,255,0.1);color:var(--blue);border:1px solid rgba(26,79,255,0.2);}
.status-badge.resolved_sender,.status-badge.resolved_receiver{background:rgba(0,201,122,0.1);color:var(--green);border:1px solid rgba(0,201,122,0.2);}
.status-badge.cancelled{background:rgba(255,255,255,0.05);color:var(--text-3);border:1px solid var(--border);}
.dispute-parties{display:flex;gap:12px;margin-bottom:12px;flex-wrap:wrap;}
.party-box{flex:1;min-width:140px;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:10px 12px;}
.party-label{font-size:10px;color:var(--text-3);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px;}
.party-name{font-size:13px;font-weight:500;}
.dispute-deal{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between;}
.deal-amt{font-family:'Syne',sans-serif;font-size:16px;font-weight:800;}
.deal-dir{font-size:12px;color:var(--text-3);}
.dispute-desc{background:rgba(252,209,22,0.04);border:1px solid rgba(252,209,22,0.15);border-radius:10px;padding:12px 14px;margin-bottom:14px;}
.desc-label{font-size:11px;color:var(--yellow);font-family:'Syne',sans-serif;font-weight:700;margin-bottom:6px;text-transform:uppercase;letter-spacing:0.5px;}
.desc-text{font-size:13px;color:var(--text-2);line-height:1.6;}
.justificatifs-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;}
.justif-thumb{width:80px;height:80px;border-radius:8px;object-fit:cover;border:1px solid var(--border);cursor:pointer;transition:transform 0.15s;}
.justif-thumb:hover{transform:scale(1.05);}
.justif-pdf{width:80px;height:80px;border-radius:8px;background:var(--surface);border:1px solid var(--border);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;text-decoration:none;gap:4px;}
.justif-pdf-icon{font-size:24px;}
.justif-pdf-label{font-size:10px;color:var(--text-3);}
.admin-note-area{width:100%;padding:10px 13px;background:var(--surface);border:1px solid var(--border);border-radius:10px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;resize:none;height:70px;margin-bottom:12px;box-sizing:border-box;}
.admin-note-area:focus{outline:none;border-color:var(--green);}
.actions-row{display:flex;gap:8px;flex-wrap:wrap;}
.btn-action{padding:10px 16px;border-radius:10px;font-family:'Syne',sans-serif;font-size:12px;font-weight:700;cursor:pointer;border:none;transition:all 0.2s;}
.btn-review{background:rgba(26,79,255,0.1);color:var(--blue);border:1px solid rgba(26,79,255,0.25);}
.btn-resolve-s{background:var(--green-glow);color:var(--green);border:1px solid var(--border-active);}
.btn-resolve-r{background:rgba(252,209,22,0.1);color:var(--yellow);border:1px solid rgba(252,209,22,0.2);}
.btn-cancel-d{background:rgba(255,255,255,0.05);color:var(--text-3);border:1px solid var(--border);}
.btn-action:active{opacity:0.7;}
.resolved-note{background:rgba(0,201,122,0.06);border:1px solid rgba(0,201,122,0.2);border-radius:10px;padding:12px 14px;margin-top:12px;}
.resolved-label{font-size:11px;color:var(--green);font-family:'Syne',sans-serif;font-weight:700;margin-bottom:4px;}
.resolved-text{font-size:13px;color:var(--text-2);}
.empty-state{text-align:center;padding:60px 20px;color:var(--text-3);}
.loading-wrap{display:flex;justify-content:center;padding:50px;}
.loader{width:30px;height:30px;position:relative;}
.loader::before,.loader::after{content:'';position:absolute;inset:0;border-radius:50%;border:2px solid transparent;animation:spin 1s linear infinite;}
.loader::before{border-top-color:var(--green);}.loader::after{border-bottom-color:var(--blue);animation-duration:1.5s;animation-direction:reverse;}
@keyframes spin{to{transform:rotate(360deg);}}
.img-viewer{position:fixed;inset:0;z-index:500;background:rgba(0,0,0,0.9);display:none;align-items:center;justify-content:center;}
.img-viewer.open{display:flex;}
.img-viewer img{max-width:90vw;max-height:90vh;border-radius:8px;}
.img-viewer-close{position:absolute;top:20px;right:20px;width:40px;height:40px;border-radius:50%;background:var(--card);border:1px solid var(--border);color:var(--text);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;}

.topbar-logo img {
  height: 32px;
  width: auto;
  display: block;
}

.user-avatar-btn{width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,var(--green-dim),var(--blue));display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-size:14px;font-weight:800;color:#fff;cursor:pointer;text-decoration:none;flex-shrink:0;border:1px solid var(--border-active);}
.share-btn{display:flex;align-items:center;gap:5px;padding:7px 12px;background:transparent;border:none;color:#fcd116;font-family:'Syne',sans-serif;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;}
.share-btn:active{opacity:0.7;}
</style>

  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#060d09">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="TDOLI">
  <link rel="apple-touch-icon" href="/icons/icon-192x192.png">
  <script>
    if('serviceWorker' in navigator){
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/service-worker.js')
          .then(r => console.log('[SW] Enregistre'))
          .catch(e => console.error('[SW] Erreur:', e));
      });
    }
  </script>
</head>
<body>
<div class="topbar">
  <div class="topbar-logo"><img src="/TDOLI_APP.png" alt="TDOLI" style="height:32px;width:auto;display:block;"></div>
  <div style="display:flex;align-items:center;gap:10px">
    <div class="admin-badge">ADMIN</div>
    <button class="logout-btn" onclick="adminLogout()">Déconnexion</button>
  </div>
</div>
<div id="loginScreen">
  <div class="login-card">
    <div class="login-title">Espace Admin</div>
    <div class="login-sub">Accès réservé à l'administrateur TDOLI</div>
    <input class="form-input" type="password" id="admin-password" placeholder="Mot de passe admin" onkeydown="if(event.key==='Enter')adminLogin()">
    <button class="btn-primary" onclick="adminLogin()">Accéder</button>
    <div class="msg" id="msg-login"></div>
  </div>
</div>
<div id="adminScreen">
  <div class="stats-row" id="statsRow"></div>
  <div class="section-title">Litiges</div>
  <div class="filter-bar">
    <div class="filter-btn active" onclick="setFilter('all',this)">Tous</div>
    <div class="filter-btn" onclick="setFilter('pending',this)">En attente</div>
    <div class="filter-btn" onclick="setFilter('reviewing',this)">En cours</div>
    <div class="filter-btn" onclick="setFilter('resolved_sender',this)">Résolus</div>
    <div class="filter-btn" onclick="setFilter('cancelled',this)">Annulés</div>
  </div>
  <div id="disputesList"></div>
</div>
<div class="img-viewer" id="imgViewer" onclick="closeViewer()">
  <img id="viewerImg" src="">
  <div class="img-viewer-close">✕</div>
</div>
<script>
const API='https://tdoli-backend.onrender.com';
let adminToken=localStorage.getItem('tdoli_admin_token');
let allDisputes=[],currentFilter='all';
if(adminToken){document.getElementById('loginScreen').style.display='none';document.getElementById('adminScreen').style.display='block';loadDisputes();}
async function adminLogin(){
  const password=document.getElementById('admin-password').value;
  try{const res=await fetch(API+'/admin/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({password})});const data=await res.json();
    if(res.ok){adminToken=data.token;localStorage.setItem('tdoli_admin_token',adminToken);document.getElementById('loginScreen').style.display='none';document.getElementById('adminScreen').style.display='block';loadDisputes();}
    else{document.getElementById('msg-login').textContent=data.message||'Mot de passe incorrect';document.getElementById('msg-login').className='msg error';}
  }catch(e){document.getElementById('msg-login').textContent='Serveur inaccessible';document.getElementById('msg-login').className='msg error';}
}
function adminLogout(){localStorage.removeItem('tdoli_admin_token');adminToken=null;document.getElementById('loginScreen').style.display='flex';document.getElementById('adminScreen').style.display='none';}
async function loadDisputes(){
  document.getElementById('disputesList').innerHTML='<div class="loading-wrap"><div class="loader"></div></div>';
  try{const res=await fetch(API+'/admin/disputes',{headers:{'x-admin-token':adminToken}});if(res.status===401){adminLogout();return;}allDisputes=await res.json();renderStats();renderDisputes();}
  catch(e){document.getElementById('disputesList').innerHTML='<div class="empty-state">Erreur de chargement</div>';}
}
function renderStats(){
  const total=allDisputes.length;const pending=allDisputes.filter(d=>d.status==='pending').length;const reviewing=allDisputes.filter(d=>d.status==='reviewing').length;const resolved=allDisputes.filter(d=>d.status.startsWith('resolved')).length;
  document.getElementById('statsRow').innerHTML='<div class="stat-card"><div class="stat-val yellow">'+pending+'</div><div class="stat-label">En attente</div></div><div class="stat-card"><div class="stat-val blue">'+reviewing+'</div><div class="stat-label">En cours</div></div><div class="stat-card"><div class="stat-val green">'+resolved+'</div><div class="stat-label">Résolus</div></div><div class="stat-card"><div class="stat-val">'+total+'</div><div class="stat-label">Total</div></div>';
}
function setFilter(filter,el){currentFilter=filter;document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));el.classList.add('active');renderDisputes();}
function renderDisputes(){
  let data=allDisputes;
  if(currentFilter==='resolved_sender')data=data.filter(d=>d.status.startsWith('resolved'));
  else if(currentFilter!=='all')data=data.filter(d=>d.status===currentFilter);
  const list=document.getElementById('disputesList');
  if(data.length===0){list.innerHTML='<div class="empty-state">Aucun litige dans cette catégorie</div>';return;}
  list.innerHTML=data.map(d=>{
    const transfer=d.transferId||{};const statusText={pending:'En attente',reviewing:'En cours',resolved_sender:'Résolu — Envoyeur',resolved_receiver:'Résolu — Receveur',cancelled:'Annulé'}[d.status]||d.status;
    const isResolved=d.status.startsWith('resolved')||d.status==='cancelled';
    const dateStr=new Date(d.createdAt).toLocaleDateString('fr-FR',{day:'2-digit',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'});
    let justifHtml='';
    if(d.justificatifs&&d.justificatifs.length>0){
      justifHtml='<div style="margin-bottom:14px"><div style="font-size:11px;color:var(--text-3);margin-bottom:8px;font-family:Syne,sans-serif;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;">Justificatifs ('+d.justificatifs.length+')</div><div class="justificatifs-row">'+
        d.justificatifs.map(j=>j.type==='pdf'?'<a href="'+j.url+'" target="_blank" class="justif-pdf"><div class="justif-pdf-icon">📄</div><div class="justif-pdf-label">PDF</div></a>':'<img src="'+j.url+'" class="justif-thumb" onclick="viewImg(\''+j.url+'\')" alt="Justificatif">').join('')+
      '</div></div>';
    }
    return '<div class="dispute-card '+d.status+'">'+
      '<div class="dispute-header"><div><div class="dispute-ref">ID: '+d._id.slice(-8).toUpperCase()+'</div><div class="dispute-date">'+dateStr+'</div></div><div class="status-badge '+d.status+'">'+statusText+'</div></div>'+
      '<div class="dispute-parties"><div class="party-box"><div class="party-label">Signalé par</div><div class="party-name">'+d.reportedBy+'</div></div><div class="party-box"><div class="party-label">Contre</div><div class="party-name">'+d.against+'</div></div></div>'+
      (transfer.amount?'<div class="dispute-deal"><div><div class="deal-amt">'+Number(transfer.amount).toLocaleString('fr-FR')+' '+(transfer.currency||'')+'</div><div class="deal-dir">'+(transfer.fromCountry||'')+' → '+(transfer.toCountry||'')+'</div></div><div style="font-size:11px;color:var(--text-3)">REF: '+(transfer._id||'').toString().slice(-6).toUpperCase()+'</div></div>':'')+
      '<div class="dispute-desc"><div class="desc-label">Description</div><div class="desc-text">'+d.description+'</div></div>'+
      justifHtml+
      (!isResolved?
        '<textarea class="admin-note-area" id="note-'+d._id+'" placeholder="Note admin visible par les parties..."></textarea>'+
        '<textarea class="admin-note-area" id="doc-msg-'+d._id+'" placeholder="Message demande de documents (optionnel)..." style="border-color:rgba(252,209,22,0.2);"></textarea>'+
        '<div style="display:flex;gap:8px;margin-bottom:8px;flex-wrap:wrap;">'+
          '<select id="doc-target-'+d._id+'" style="padding:8px 12px;background:#0c1710;border:1px solid rgba(252,209,22,0.2);border-radius:8px;color:#fcd116;font-family:Syne,sans-serif;font-size:11px;font-weight:700;cursor:pointer;">'+
            '<option value="both">Les deux parties</option>'+
            '<option value="reporter">Déclarant seulement</option>'+
            '<option value="against">Mis en cause seulement</option>'+
          '</select>'+
          '<button class="btn-action" style="background:rgba(252,209,22,0.08);color:#fcd116;border:1px solid rgba(252,209,22,0.2);" onclick="requestDocs(\''+d._id+'\')">📎 Demander des documents</button>'+
        '</div>'+
        '<div class="actions-row">'+(d.status==='pending'?'<button class="btn-action btn-review" onclick="takeReview(\''+d._id+'\')">Prendre en charge</button>':'')+
        '<button class="btn-action btn-resolve-s" onclick="resolve(\''+d._id+'\',\'resolved_sender\')">✓ Faveur Envoyeur</button>'+
        '<button class="btn-action btn-resolve-r" onclick="resolve(\''+d._id+'\',\'resolved_receiver\')">✓ Faveur Receveur</button>'+
        '<button class="btn-action btn-cancel-d" onclick="resolve(\''+d._id+'\',\'cancelled\')">Annuler</button></div>'
      :(d.adminNote?'<div class="resolved-note"><div class="resolved-label">Note admin</div><div class="resolved-text">'+d.adminNote+'</div></div>':''))+
    '</div>';
  }).join('');
}
async function requestDocs(id){
  const msgEl=document.getElementById('doc-msg-'+id);const targetEl=document.getElementById('doc-target-'+id);
  const message=msgEl?msgEl.value.trim():'';const target=targetEl?targetEl.value:'both';
  if(!message){alert('Ecris le message de demande de documents');return;}
  try{const res=await fetch(API+'/admin/disputes/'+id+'/request-documents',{method:'POST',headers:{'Content-Type':'application/json','x-admin-token':adminToken},body:JSON.stringify({message,target})});
    const data=await res.json();if(res.ok){alert(data.message);if(msgEl)msgEl.value='';}else alert(data.message||'Erreur');}catch(e){alert('Erreur');}
}
async function takeReview(id){try{const res=await fetch(API+'/admin/disputes/'+id+'/review',{method:'PUT',headers:{'x-admin-token':adminToken}});if(res.ok)loadDisputes();}catch(e){}}
async function resolve(id,status){
  const noteEl=document.getElementById('note-'+id);const adminNote=noteEl?noteEl.value.trim():'';
  const labels={resolved_sender:'Résoudre en faveur de l\'envoyeur ?',resolved_receiver:'Résoudre en faveur du receveur ?',cancelled:'Annuler ce litige ?'};
  if(!confirm(labels[status]||'Confirmer ?'))return;
  try{const res=await fetch(API+'/admin/disputes/'+id+'/resolve',{method:'PUT',headers:{'Content-Type':'application/json','x-admin-token':adminToken},body:JSON.stringify({status,adminNote})});if(res.ok)loadDisputes();}catch(e){}
}
function viewImg(url){document.getElementById('viewerImg').src=url;document.getElementById('imgViewer').classList.add('open');}
function closeViewer(){document.getElementById('imgViewer').classList.remove('open');}
setInterval(()=>{if(adminToken)loadDisputes();},60000);

function initAvatar(){
  const username=localStorage.getItem('tdoli_username')||localStorage.getItem('tdoli_email')||'';
  let initials='?';
  if(username){
    const parts=username.trim().split(' ').filter(p=>p.length>0);
    if(parts.length>=2) initials=(parts[0][0]+parts[parts.length-1][0]).toUpperCase();
    else initials=username.substring(0,2).toUpperCase();
  }
  const btn=document.getElementById('avatarBtn');
  if(btn){btn.textContent=initials;}
}
if(document.readyState==='loading'){document.addEventListener('DOMContentLoaded',initAvatar);}
else{initAvatar();}
window.addEventListener('storage',initAvatar);
function shareApp(){
  const username=localStorage.getItem('tdoli_username')||localStorage.getItem('tdoli_email')||'un ami';
  const msg='Rejoins-moi sur TDOLI — transfert P2P pour la diaspora africaine !\nhttps://tdoli.com\nParrainé par '+username;
  if(navigator.share){navigator.share({title:'TDOLI',text:msg,url:'https://tdoli.com'});}
  else{window.open('https://wa.me/?text='+encodeURIComponent(msg),'_blank');}
}
</script>
</body>
</html>
