<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>TDOLI — Messages</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
 --bg:#05090a;--surface:#0b1215;--card:#0f1a1e;
 --green:#00e676;--green-dim:#00c853;--green-glow:rgba(0,230,118,0.10);
 --yellow:#ffd740;--blue:#2979ff;--red:#ff1744;
 --text:#ecf4f0;--text-2:#90a8a0;--text-3:#4a6860;
 --border:rgba(255,255,255,0.06);--border-active:rgba(0,230,118,0.22);
 --r:12px;
 --shadow:0 2px 20px rgba(0,0,0,0.5);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:88px;}

/* TOPBAR */
.topbar{position:sticky;top:0;z-index:100;background:rgba(8,12,10,0.95);backdrop-filter:blur(20px);border-bottom:1px solid rgba(0,0,0,0.08);padding:14px 20px;display:flex;align-items:center;gap:12px;box-shadow:0 1px 12px rgba(0,0,0,0.3);}
.topbar-title{font-family:'Syne',sans-serif;font-size:18px;font-weight:800;color:var(--text);}
.topbar-sub{font-size:12px;color:var(--text-3);margin-top:1px;}
.back-btn{width:36px;height:36px;border-radius:50%;background:var(--surface);border:1px solid var(--border);color:var(--text-2);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;text-decoration:none;transition:all 0.2s;}
.back-btn:active{background:var(--card);}

/* LISTE CONVERSATIONS — même patron que .deal-item sur tdoli-deals.html :
   icône à gauche, corps empilé au centre, un seul badge à droite centré. */
.conv-list{padding:12px 16px;max-width:480px;margin:0 auto;}
.conv-item{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px 16px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:background 0.2s;animation:cardIn 0.35s cubic-bezier(0.19,1,0.22,1) both;position:relative;overflow:hidden;}
@keyframes cardIn{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
.conv-item:active{background:var(--surface);}
.conv-item.unread{border-left:3px solid var(--green);}
.conv-avatar{width:52px;height:52px;border-radius:50%;background:var(--green-dim);display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-size:15px;font-weight:800;color:#fff;flex-shrink:0;position:relative;border:1px solid var(--border-active);}
.conv-avatar-online{position:absolute;bottom:1px;right:1px;width:11px;height:11px;border-radius:50%;background:#00d982;border:2px solid var(--card);}
.conv-body{flex:1;min-width:0;}
.conv-name{font-family:'Syne',sans-serif;font-size:15px;font-weight:800;color:var(--text);margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.conv-preview{font-size:12px;color:var(--text-3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.conv-preview.unread{color:var(--text-2);font-weight:600;}
.conv-badge{font-family:'Syne',sans-serif;font-size:10px;font-weight:700;padding:4px 10px;border-radius:20px;flex-shrink:0;align-self:center;white-space:nowrap;}
.conv-badge.unread{background:var(--green);color:#fff;}
.conv-badge.matched{background:rgba(0,230,118,0.08);color:var(--green);border:1px solid rgba(0,230,118,0.25);}
.conv-badge.completed{background:rgba(41,121,255,0.08);color:var(--blue);border:1px solid rgba(41,121,255,0.25);}

svg{fill:none;stroke:currentColor;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;}

/* EMPTY */
.empty-state{text-align:center;padding:60px 20px;}
.empty-icon{font-size:48px;margin-bottom:16px;}
.empty-title{font-family:'Syne',sans-serif;font-size:17px;font-weight:800;margin-bottom:8px;}
.empty-sub{font-size:13px;color:var(--text-3);line-height:1.6;}

/* LOADING */
.loader-wrap{display:flex;justify-content:center;padding:50px;}
.loader{width:30px;height:30px;position:relative;}
.loader::before,.loader::after{content:'';position:absolute;inset:0;border-radius:50%;border:2px solid transparent;animation:spin 1s linear infinite;}
.loader::before{border-top-color:var(--green);}
.loader::after{border-bottom-color:var(--blue);animation-duration:1.5s;animation-direction:reverse;}
@keyframes spin{to{transform:rotate(360deg);}}

/* TOAST */
.toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%) translateY(8px);color:#fff;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;padding:11px 22px;border-radius:30px;z-index:500;opacity:0;pointer-events:none;transition:opacity 0.25s,transform 0.25s;box-shadow:0 4px 20px rgba(0,0,0,0.2);}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* RECHERCHE */
.search-bar{padding:12px 16px 4px;max-width:480px;margin:0 auto;}
.search-input{width:100%;padding:11px 16px 11px 40px;background:var(--card);border:1px solid var(--border);border-radius:24px;font-family:'Inter',sans-serif;font-size:14px;color:var(--text);position:relative;box-shadow:0 1px 6px rgba(0,0,0,0.04);}
.search-input:focus{outline:none;border-color:var(--green);}
.search-wrap{position:relative;}
.search-icon{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:var(--text-3);pointer-events:none;}</style>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#f5f7f5">
<meta name="apple-mobile-web-app-capable" content="yes">
<link rel="stylesheet" href="/tdoli-theme.css">
</head>
<body>

<div class="topbar">
 <a class="back-btn" href="/tdoli-feed.html" aria-label="Retour">
  <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
 </a>
 <div>
  <div class="topbar-title">Messages</div>
  <div class="topbar-sub" id="convCount">Chargement...</div>
 </div>
</div>


<!-- Bandeau notifications désactivées -->
<div id="notifBanner" style="display:none;margin:12px 16px 0;max-width:480px;margin-left:auto;margin-right:auto;">
  <div style="background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px 16px;display:flex;align-items:flex-start;gap:12px;">
    <svg viewBox="0 0 24 24" width="20" height="20" style="flex-shrink:0;margin-top:2px;color:var(--text-3);fill:none;stroke:currentColor;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;"><path d="M13.73 21a2 2 0 01-3.46 0"/><path d="M18.63 13A17.89 17.89 0 0118 8"/><path d="M6.26 6.26A5.86 5.86 0 006 8c0 7-3 9-3 9h14"/><path d="M18 8a6 6 0 00-9.33-5"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
    <div style="flex:1;">
      <div style="font-family:'Syne',sans-serif;font-size:13px;font-weight:700;color:var(--text);margin-bottom:4px;">Notifications désactivées</div>
      <div style="font-size:12px;color:var(--text-3);margin-bottom:10px;">Active-les pour ne manquer aucun message ou match.</div>
      <button onclick="activerNotifications()" style="background:var(--green-dim);color:#fff;border:none;border-radius:8px;padding:8px 16px;font-family:'Syne',sans-serif;font-size:12px;font-weight:700;cursor:pointer;">Activer les notifications</button>
    </div>
    <button onclick="document.getElementById('notifBanner').style.display='none'" style="background:none;border:none;color:var(--text-3);cursor:pointer;font-size:18px;line-height:1;padding:0;">×</button>
  </div>
</div>

<div class="search-bar">
 <div class="search-wrap">
 <svg class="search-icon" viewBox="0 0 24 24" width="16" height="16"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
 <input class="search-input" type="text" id="searchInput" placeholder="Rechercher une conversation..." oninput="filterConvs(this.value)">
 </div>
</div>

<div id="convList" class="conv-list">
 <div class="loader-wrap"><div class="loader"></div></div>
</div>

<nav class="bottom-nav">
  <a class="nav-item" href="/tdoli-feed.html" onclick="navTo(event,this)">
    <div class="nav-icon"><svg viewBox="0 0 24 24" width="20" height="20"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg></div>
    <span>Feed</span>
  </a>
  <a class="nav-item" href="/tdoli-request.html" onclick="navTo(event,this)">
    <div class="nav-icon"><svg viewBox="0 0 24 24" width="20" height="20"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg></div>
    <span>Demandes</span>
  </a>
  <a class="nav-item" href="/tdoli-deals.html" onclick="navTo(event,this)">
    <div class="nav-icon-wrap">
      <div class="nav-icon"><svg viewBox="0 0 24 24" width="20" height="20"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 014-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 01-4 4H3"/></svg></div>
      <div class="nav-badge yellow" id="dealsBadge"></div>
    </div>
    <span>Deals</span>
  </a>
  <a class="nav-item active" href="/tdoli-messages.html">
    <div class="nav-icon-wrap">
      <div class="nav-icon"><svg viewBox="0 0 24 24" width="20" height="20"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg></div>
      <div class="nav-badge red" id="msgBadge"></div>
    </div>
    <span>Messages</span>
  </a>
  <a class="nav-item" href="/tdoli-profile.html" onclick="navTo(event,this)">
    <div class="nav-icon"><svg viewBox="0 0 24 24" width="20" height="20"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></div>
    <span>Profil</span>
  </a>
</nav>

<div class="toast" id="toast"></div>

<script>
const API = 'https://tdoli-backend.onrender.com';
const token = localStorage.getItem('tdoli_token');
const email = localStorage.getItem('tdoli_email');
if (!token) window.location.replace('/tdoli-auth.html');

function navTo(e, el) {
 if (el.classList.contains('active')) return;
 e.preventDefault();
 if (navigator.vibrate) navigator.vibrate(30);
 document.body.style.transition = 'opacity 0.13s ease';
 document.body.style.opacity = '0';
 setTimeout(() => { window.location.href = el.href; }, 130);
}

let allConvs = [];

function timeAgo(d) {
 if (!d) return '';
 const diff = Date.now() - new Date(d).getTime();
 const m = Math.floor(diff / 60000);
 if (m < 1) return "À l'instant";
 if (m < 60) return m + ' min';
 const h = Math.floor(m / 60);
 if (h < 24) return h + 'h';
 const days = Math.floor(h / 24);
 if (days < 7) return days + 'j';
 return new Date(d).toLocaleDateString('fr-FR', { day:'numeric', month:'short' });
}

function getInitials(name) {
 const p = (name||'?').trim().split(' ').filter(x=>x.length>0);
 return p.length >= 2 ? (p[0][0]+p[p.length-1][0]).toUpperCase() : (name||'??').substring(0,2).toUpperCase();
}

function showToast(msg, color) {
 const t = document.getElementById('toast');
 t.textContent = msg; t.style.background = color || 'var(--green-dim)';
 t.classList.add('show');
 setTimeout(() => t.classList.remove('show'), 3000);
}

function renderConvs(convs) {
 const list = document.getElementById('convList');
 const count = document.getElementById('convCount');

 if (convs.length === 0) {
 count.textContent = 'Aucune conversation';
 list.innerHTML = `<div class="empty-state">
 <div class="empty-icon"></div>
 <div class="empty-title">Aucun message</div>
 <div class="empty-sub">Tes conversations avec tes partenaires d'échange apparaîtront ici.</div>
 </div>`;
 return;
 }

 const totalUnread = convs.reduce((acc, c) => acc + (c.unreadCount || 0), 0);
 count.textContent = convs.length + ' conversation' + (convs.length > 1 ? 's' : '') +
 (totalUnread > 0 ? ' · ' + totalUnread + ' non lu' + (totalUnread > 1 ? 's' : '') : '');

 list.innerHTML = convs.map(c => {
 const isUnread = c.unreadCount > 0;
 const ini = getInitials(c.otherUsername);
 const statusCls = c.dealStatus === 'completed' ? 'completed' : 'matched';
 const statusLabel = c.dealStatus === 'completed' ? 'Terminé' : ' En cours';
 const preview = c.lastMessage
 ? (c.lastMessage.sender === email ? 'Vous : ' : '') + c.lastMessage.text.substring(0, 50) + (c.lastMessage.text.length > 50 ? '…' : '')
 : 'Aucun message — Commence la conversation !';

 return `<div class="conv-item ${isUnread ? 'unread' : ''}" onclick="openChat('${c.dealId}')">
 <div class="conv-avatar">
 ${ini}
 ${c.isOnline ? '<div class="conv-avatar-online"></div>' : ''}
 </div>
 <div class="conv-body">
 <div class="conv-name">${c.otherUsername}</div>
 <div class="conv-preview ${isUnread ? 'unread' : ''}">${preview} · ${timeAgo(c.lastMessage?.createdAt)}</div>
 </div>
 <div class="conv-badge ${isUnread ? 'unread' : statusCls}">${isUnread ? c.unreadCount : statusLabel}</div>
 </div>`;
 }).join('');
}

function filterConvs(query) {
 if (!query.trim()) { renderConvs(allConvs); return; }
 const q = query.toLowerCase();
 const filtered = allConvs.filter(c =>
 c.otherUsername?.toLowerCase().includes(q) ||
 c.dealCode?.toLowerCase().includes(q) ||
 c.lastMessage?.text?.toLowerCase().includes(q)
 );
 renderConvs(filtered);
}

function openChat(dealId) {
 window.location.href = '/tdoli-chat.html?deal=' + dealId;
}

async function loadConversations() {
 try {
 const res = await fetch(API + '/messages/conversations', {
 headers: { 'Authorization': 'Bearer ' + token }
 });
 if (!res.ok) {
 if (res.status === 401) { localStorage.clear(); window.location.replace('/tdoli-auth.html'); return; }
 throw new Error('Erreur serveur');
 }
 const data = await res.json();
 allConvs = Array.isArray(data) ? data : [];
 renderConvs(allConvs);

 // Badge nav
 const totalUnread = allConvs.reduce((acc, c) => acc + (c.unreadCount || 0), 0);
 const badge = document.getElementById('msgBadge');
 if (badge) {
 if (totalUnread > 0) { badge.textContent = totalUnread > 9 ? '9+' : totalUnread; badge.classList.add('show'); }
 else { badge.classList.remove('show'); }
 }
 } catch(e) {
 document.getElementById('convList').innerHTML = `<div class="empty-state">
 <div class="empty-icon"></div>
 <div class="empty-title">Erreur de connexion</div>
 <div class="empty-sub">Vérifie ta connexion internet.</div>
 </div>`;
 }
}

async function checkDeals() {
 try {
 const res = await fetch(API + '/deals/mine', { headers: { 'Authorization': 'Bearer ' + token } });
 const deals = await res.json();
 if (Array.isArray(deals)) {
 const active = deals.filter(d => d.status === 'matched').length;
 const badge = document.getElementById('dealsBadge');
 if (badge) { if (active > 0) { badge.textContent = active; badge.classList.add('show'); } else { badge.classList.remove('show'); } }
 }
 } catch(e) {}
}

loadConversations();
checkDeals();

// ── Rafraîchissement automatique — un nouveau message peut arriver sans
// action de l'utilisateur ────────────────────────────────────────────────
setInterval(() => { if (document.visibilityState === 'visible') loadConversations(); }, 15000);
document.addEventListener('visibilitychange', () => {
 if (document.visibilityState === 'visible') loadConversations();
});
</script>



<script src="/tdoli-deals-complete.js"></script>

<script>
// ── Retour haptique sur tous les boutons ─────────────────────
(function() {
  function triggerHaptic() {
    if (navigator.vibrate) navigator.vibrate(8);
    // iOS (via AudioContext trick si vibrate absent)
  }
  document.addEventListener('pointerdown', function(e) {
    const el = e.target.closest('button, .btn-primary, .btn-cancel, .nav-item, .annonce-item, .conv-item, .deal-card, .settings-item, .filter-chip, .back-btn');
    if (el) triggerHaptic();
  }, { passive: true });
})();
</script>


<script>
// Afficher bandeau si notifications pas accordées
(function() {
  if (!('Notification' in window)) return;
  if (Notification.permission !== 'default') return;
  // Afficher après 1s
  setTimeout(() => {
    const banner = document.getElementById('notifBanner');
    if (banner) banner.style.display = 'block';
  }, 1000);
})();

async function activerNotifications() {
  if (typeof requestFCMPermission === 'function') {
    const granted = await requestFCMPermission();
    if (granted) document.getElementById('notifBanner').style.display = 'none';
  } else {
    const perm = await Notification.requestPermission();
    if (perm === 'granted') document.getElementById('notifBanner').style.display = 'none';
  }
}
</script>

</body>
</html>
