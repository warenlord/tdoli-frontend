<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>TDOLI — Nouveau mot de passe</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#05090a;--surface:#0b1215;--card:#0f1a1e;--green:#00e676;--green-dim:#00c853;--green-glow:rgba(0,230,118,0.10);--yellow:#ffd740;--blue:#2979ff;--text:#ecf4f0;--text-2:#90a8a0;--text-3:#4a6860;--border:rgba(255,255,255,0.06);--border-active:rgba(0,230,118,0.3);--red:#ff1744;--r:16px;}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
.bg-mesh{position:fixed;inset:0;z-index:0;pointer-events:none;background:radial-gradient(ellipse 70% 50% at 15% 10%,rgba(0,180,90,0.08) 0%,transparent 60%);}
.wrap{position:relative;z-index:1;width:100%;max-width:420px;}
.logo{font-family:'Syne',sans-serif;font-weight:800;font-size:28px;color:var(--green);text-align:center;margin-bottom:8px;}
.subtitle{font-size:13px;color:var(--text-3);text-align:center;margin-bottom:28px;}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:28px 24px;}
.card-title{font-family:'Syne',sans-serif;font-size:17px;font-weight:800;margin-bottom:6px;}
.card-sub{font-size:13px;color:var(--text-3);margin-bottom:20px;line-height:1.5;}
.form-group{margin-bottom:14px;}
.form-label{display:block;font-size:11px;font-weight:500;color:var(--text-3);margin-bottom:7px;letter-spacing:1.2px;text-transform:uppercase;}
.input-wrap{position:relative;}
.form-input{width:100%;padding:13px 44px 13px 14px;background:var(--surface);border:1px solid var(--border);border-radius:12px;color:var(--text);font-family:'Inter',sans-serif;font-size:15px;transition:all 0.2s;-webkit-appearance:none;}
.form-input.no-icon{padding-right:14px;}
.form-input:focus{outline:none;border-color:var(--green);background:rgba(0,230,118,0.04);box-shadow:0 0 0 3px var(--green-glow);}
.form-input::placeholder{color:var(--text-3);opacity:0.5;}
.input-toggle{position:absolute;right:14px;top:50%;transform:translateY(-50%);color:var(--text-3);font-size:13px;cursor:pointer;font-family:'Syne',sans-serif;font-weight:700;background:none;border:none;padding:4px;}
.strength-bar{display:flex;gap:4px;margin-top:8px;}
.strength-seg{flex:1;height:2px;border-radius:1px;background:var(--border);transition:background 0.3s;}
.strength-seg.weak{background:var(--red);}.strength-seg.ok{background:var(--yellow);}.strength-seg.strong{background:var(--green);}
.requirements{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;margin-bottom:16px;}
.req-item{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--text-3);margin-bottom:6px;}
.req-item:last-child{margin-bottom:0;}
.req-item.ok{color:var(--green);}
.req-dot{width:6px;height:6px;border-radius:50%;background:var(--text-3);flex-shrink:0;}
.req-item.ok .req-dot{background:var(--green);}
.btn-primary{width:100%;padding:15px;background:linear-gradient(135deg,var(--green-dim) 0%,#004d2a 50%,#001a6e 100%);color:#fff;border:none;border-radius:13px;font-family:'Syne',sans-serif;font-size:14px;font-weight:700;cursor:pointer;position:relative;overflow:hidden;margin-top:6px;transition:transform 0.15s;}
.btn-primary::after{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,var(--green),var(--yellow),var(--blue));}
.btn-primary:active{transform:scale(0.97);}
.btn-primary:disabled{opacity:0.35;cursor:not-allowed;}
.btn-spinner{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,0.2);border-top-color:#fff;border-radius:50%;animation:spin 0.5s linear infinite;vertical-align:middle;}
@keyframes spin{to{transform:rotate(360deg);}}
.msg{display:none;padding:12px 14px;border-radius:10px;font-size:13px;margin-top:12px;}
.msg.error{background:rgba(255,68,68,0.08);border:1px solid rgba(255,68,68,0.2);color:#ff6b6b;}
.msg.success{background:rgba(0,230,118,0.08);border:1px solid rgba(0,230,118,0.2);color:var(--green);}
.msg.show{display:block;}
.back-link{display:block;text-align:center;margin-top:16px;font-size:13px;color:var(--text-3);text-decoration:none;}
.back-link:hover{color:var(--green);}

.topbar-logo img { height: 32px; width: auto; display: block; }

/* UX Fluide */

/* Transition de page */
body { animation: pageFadeIn 0.2s ease; }
@keyframes pageFadeIn { from { opacity:0; transform:translateY(4px); } to { opacity:1; transform:translateY(0); } }

/* Swipe to close sheet */
.sheet { touch-action: pan-y; }

/* Pull-to-refresh indicator */
.ptr-indicator { position:fixed;top:0;left:50%;transform:translateX(-50%) translateY(-48px);z-index:200;width:36px;height:36px;border-radius:50%;background:var(--card);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;transition:transform 0.2s;box-shadow:var(--shadow); }
.ptr-indicator.visible { transform:translateX(-50%) translateY(8px); }
.ptr-spinner { width:18px;height:18px;border:2px solid var(--border);border-top-color:var(--green);border-radius:50%;animation:spin 0.6s linear infinite; }

/* Skeleton loader */
.skeleton { background:linear-gradient(90deg,var(--surface) 25%,var(--card) 50%,var(--surface) 75%);background-size:200% 100%;animation:shimmer 1.2s infinite;border-radius:var(--r); }
@keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
.skeleton-item { height:72px;margin-bottom:8px;border-radius:var(--r); }
.skeleton-line { height:12px;margin-bottom:6px; }
.skeleton-line.short { width:40%; }
.skeleton-line.medium { width:65%; }

/* Feedback copie */
.copy-feedback { position:fixed;bottom:110px;left:50%;transform:translateX(-50%) translateY(4px);background:var(--green-dim);color:#fff;font-family:'Syne',sans-serif;font-size:12px;font-weight:700;padding:8px 18px;border-radius:20px;opacity:0;pointer-events:none;transition:opacity 0.2s,transform 0.2s;z-index:600; }
.copy-feedback.show { opacity:1;transform:translateX(-50%) translateY(0); }

/* Progress bar étapes deal */
.step-line { flex:1;height:2px;background:var(--border);transition:background 0.4s; }
.step-line.done { background:var(--green); }
.step-node { transition:all 0.3s; }

/* Timer countdown */
.timer-bar { height:3px;background:var(--border);border-radius:2px;overflow:hidden;margin-top:6px; }
.timer-fill { height:100%;background:var(--green);transition:width 1s linear; }
.timer-fill.warning { background:var(--yellow); }
.timer-fill.danger { background:var(--red); }
.timer-label { font-size:11px;font-family:'Syne',sans-serif;font-weight:700;margin-top:4px; }
.timer-label.warning { color:var(--yellow); }
.timer-label.danger { color:var(--red); }

/* Bouton primaire feedback */
.btn-primary { transition:transform 0.12s,opacity 0.12s,box-shadow 0.12s; }
.btn-primary:active { transform:scale(0.97); }

/* Card hover */
.annonce-item { transition:transform 0.12s,box-shadow 0.12s; }
.annonce-item:active { transform:scale(0.985); }

/* Chat message sent feedback */
.msg-sending { opacity:0.6; }
.msg-sent { opacity:1;transition:opacity 0.2s; }

/* ── Fluidité navigation ─────────────────────────────────────── */
@keyframes tdoliFadeIn{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
body{animation:tdoliFadeIn 0.2s ease-out both;}
.nav-item{transition:color 0.2s,opacity 0.15s;}
a{-webkit-tap-highlight-color:transparent;}

/* ── Montants forcés blanc ───────────────────────────────────── */
.item-amount,.detail-amount,.deal-amount-lg,.detail-amt,.stat-val,
.conv-amount,.deal-banner-amount,.amount,.limit-val,.weekly-stat-val {
  font-family:'Syne',sans-serif !important;
  font-weight:800 !important;
  color:#ecf4f0 !important;
  letter-spacing:-0.3px;
}
.item-currency,.detail-currency,.detail-cur,.currency {
  font-family:'Syne',sans-serif !important;
  font-weight:700 !important;
  color:#ecf4f0 !important;
}
</style>

 <link rel="manifest" href="/manifest.json">
 <meta name="theme-color" content="#05090a">
 <meta name="apple-mobile-web-app-capable" content="yes">
 <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
 <meta name="apple-mobile-web-app-title" content="TDOLI">
 <link rel="apple-touch-icon" href="/icons/icon-192x192.png">
 <script>
 if('serviceWorker' in navigator){
 window.addEventListener('load', () => {
 navigator.serviceWorker.register('/service-worker.js')
 .then(r => console.log('[SW] Enregistre'))
 .catch(e => console.error('[SW] Erreur:', e));
 });
 }
 </script>
</head>
<body>
<div class="bg-mesh"></div>
<div class="wrap">
 <img src="/TDOLI_APP.png" alt="TDOLI" style="width:56px;height:56px;margin:0 auto 10px;display:block;">
 <div class="subtitle">Transfert Diaspora · P2P</div>
 <div class="card" id="resetCard">
 <div class="card-title">Nouveau mot de passe</div>
 <div class="card-sub">Choisis un mot de passe fort pour sécuriser ton compte.</div>
 <div class="form-group">
 <label class="form-label">Nouveau mot de passe</label>
 <div class="input-wrap">
 <input class="form-input" type="password" id="new-password" placeholder="Minimum 8 caractères" oninput="checkStrength(this.value)">
 <button class="input-toggle" onclick="togglePw('new-password',this)" type="button">Voir</button>
 </div>
 <div class="strength-bar"><div class="strength-seg" id="s1"></div><div class="strength-seg" id="s2"></div><div class="strength-seg" id="s3"></div><div class="strength-seg" id="s4"></div></div>
 </div>
 <div class="requirements">
 <div class="req-item" id="req-length"><div class="req-dot"></div>Minimum 8 caractères</div>
 <div class="req-item" id="req-upper"><div class="req-dot"></div>Au moins 1 majuscule</div>
 <div class="req-item" id="req-number"><div class="req-dot"></div>Au moins 1 chiffre</div>
 <div class="req-item" id="req-special"><div class="req-dot"></div>Au moins 1 caractère spécial (!@#$...)</div>
 </div>
 <div class="form-group">
 <label class="form-label">Confirmer le mot de passe</label>
 <div class="input-wrap">
 <input class="form-input" type="password" id="confirm-password" placeholder="Répète le mot de passe">
 <button class="input-toggle" onclick="togglePw('confirm-password',this)" type="button">Voir</button>
 </div>
 </div>
 <button class="btn-primary" id="btn-reset" onclick="doReset()">Enregistrer le mot de passe</button>
 <div class="msg" id="msg-reset"></div>
 <a href="/tdoli-auth.html" class="back-link">← Retour à la connexion</a>
 </div>
</div>
<script>
const API='https://tdoli-backend.onrender.com';
const params=new URLSearchParams(window.location.search);
const token=params.get('token');
const email=params.get('email');

if(!token||!email){
 document.getElementById('resetCard').innerHTML='<div style="text-align:center;padding:20px"><div style="font-family:Syne,sans-serif;font-size:16px;font-weight:800;margin-bottom:8px;color:#ff6b6b">Lien invalide</div><div style="font-size:13px;color:#4a6860">Ce lien est invalide ou a expiré.</div><a href="/tdoli-auth.html" style="display:block;margin-top:16px;color:#00e676;font-size:13px;text-decoration:none">← Retour à la connexion</a></div>';
}

function togglePw(inputId,btn){const inp=document.getElementById(inputId);if(inp.type==='password'){inp.type='text';btn.textContent='Cacher';}else{inp.type='password';btn.textContent='Voir';}}

function checkStrength(val){
 const segs=['s1','s2','s3','s4'];segs.forEach(s=>document.getElementById(s).className='strength-seg');

 const hasLength=val.length>=8;
 const hasUpper=/[A-Z]/.test(val);
 const hasNumber=/[0-9]/.test(val);
 const hasSpecial=/[^A-Za-z0-9]/.test(val);

 document.getElementById('req-length').className='req-item'+(hasLength?' ok':'');
 document.getElementById('req-upper').className='req-item'+(hasUpper?' ok':'');
 document.getElementById('req-number').className='req-item'+(hasNumber?' ok':'');
 document.getElementById('req-special').className='req-item'+(hasSpecial?' ok':'');

 let score=[hasLength,hasUpper,hasNumber,hasSpecial].filter(Boolean).length;
 const cls=score<=1?'weak':score<=2?'ok':'strong';
 for(let i=0;i<score;i++)document.getElementById(segs[i]).classList.add(cls);
}

async function doReset(){
 const password=document.getElementById('new-password').value;
 const confirm=document.getElementById('confirm-password').value;

 if(!password){showMsg('Saisis un mot de passe','error');return;}
 if(password.length<8){showMsg('Minimum 8 caractères','error');return;}
 if(!/[A-Z]/.test(password)){showMsg('Au moins 1 majuscule requise','error');return;}
 if(!/[0-9]/.test(password)){showMsg('Au moins 1 chiffre requis','error');return;}
 if(!/[^A-Za-z0-9]/.test(password)){showMsg('Au moins 1 caractère spécial requis','error');return;}
 if(password!==confirm){showMsg('Les mots de passe ne correspondent pas','error');return;}

 const btn=document.getElementById('btn-reset');btn.disabled=true;btn.innerHTML='<span class="btn-spinner"></span>';
 try{
 const res=await fetch(API+'/auth/reset-password',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email,token,password})});
 const data=await res.json();
 if(res.ok){
 showMsg('Mot de passe mis à jour ! Redirection...','success');
 setTimeout(()=>{window.location.href='/tdoli-auth.html';},2000);
 }else showMsg(data.message||'Erreur','error');
 }catch(e){showMsg('Serveur inaccessible','error');}
 btn.disabled=false;btn.innerHTML='Enregistrer le mot de passe';
}

function showMsg(text,type){const el=document.getElementById('msg-reset');el.className='msg '+type+' show';el.textContent=text;}

// UX Fluide 

// 1. Swipe-to-close pour toutes les sheets
function initSwipeToClose() {
 document.querySelectorAll('.sheet').forEach(sheet => {
 let startY = 0, isDragging = false;
 const overlay = sheet.closest('.overlay');
 if (!overlay) return;
 sheet.addEventListener('touchstart', e => { startY = e.touches[0].clientY; isDragging = true; }, { passive: true });
 sheet.addEventListener('touchmove', e => {
 if (!isDragging) return;
 const dy = e.touches[0].clientY - startY;
 if (dy > 0) sheet.style.transform = `translateY(${dy}px)`;
 }, { passive: true });
 sheet.addEventListener('touchend', e => {
 isDragging = false;
 const dy = e.changedTouches[0].clientY - startY;
 if (dy > 80) {
 sheet.style.transform = '';
 overlay.classList.remove('open');
 } else {
 sheet.style.transform = '';
 }
 });
 });
}
document.addEventListener('DOMContentLoaded', initSwipeToClose);

// Observer pour initier swipe sur nouvelles sheets
const _swipeObserver = new MutationObserver(() => initSwipeToClose());
_swipeObserver.observe(document.body, { childList:true, subtree:true });

// 2. Copier avec feedback visuel
function copyWithFeedback(text, label) {
 navigator.clipboard.writeText(text).then(() => {
 let fb = document.querySelector('.copy-feedback');
 if (!fb) { fb = document.createElement('div'); fb.className = 'copy-feedback'; document.body.appendChild(fb); }
 fb.textContent = label || 'Copié !';
 fb.classList.add('show');
 setTimeout(() => fb.classList.remove('show'), 1800);
 });
}

// 3. Skeleton loaders
function showSkeletons(containerId, count) {
 const el = document.getElementById(containerId);
 if (!el) return;
 el.innerHTML = Array(count).fill('<div class="skeleton skeleton-item"></div>').join('');
}

// 4. Pull-to-refresh
function initPullToRefresh(onRefresh) {
 let startY = 0, pulling = false;
 const indicator = document.createElement('div');
 indicator.className = 'ptr-indicator';
 indicator.innerHTML = '<div class="ptr-spinner"></div>';
 document.body.appendChild(indicator);

 document.addEventListener('touchstart', e => {
 if (window.scrollY === 0) { startY = e.touches[0].clientY; pulling = true; }
 }, { passive: true });
 document.addEventListener('touchmove', e => {
 if (!pulling) return;
 const dy = e.touches[0].clientY - startY;
 if (dy > 60) indicator.classList.add('visible');
 }, { passive: true });
 document.addEventListener('touchend', e => {
 if (!pulling) return;
 pulling = false;
 const dy = e.changedTouches[0].clientY - startY;
 if (dy > 80) { onRefresh && onRefresh(); }
 setTimeout(() => indicator.classList.remove('visible'), 300);
 });
}

// 5. Auto-focus premier input à l'ouverture des sheets
document.addEventListener('click', e => {
 const btn = e.target.closest('[onclick*="Sheet"], [onclick*="openCreate"], [onclick*="openEdit"]');
 if (!btn) return;
 setTimeout(() => {
 const sheet = document.querySelector('.overlay.open .form-input:not([type=hidden])');
 if (sheet) sheet.focus();
 }, 350);
});

// 6. Timer countdown visuel
function renderTimerCountdown(deadlineStr, containerId) {
 const el = document.getElementById(containerId);
 if (!el || !deadlineStr) return;
 function update() {
 const left = new Date(deadlineStr) - Date.now();
 if (left <= 0) { el.innerHTML = '<div class="timer-label danger">Expiré</div>'; return; }
 const h = Math.floor(left / 3600000);
 const m = Math.floor((left % 3600000) / 60000);
 const pct = Math.min(100, (left / 86400000) * 100);
 const cls = pct < 20 ? 'danger' : pct < 50 ? 'warning' : '';
 el.innerHTML = '<div class="timer-bar"><div class="timer-fill ' + cls + '" style="width:' + pct + '%"></div></div>'
 + '<div class="timer-label ' + cls + '">' + h + 'h ' + m + 'min restantes</div>';
 }
 update();
 setInterval(update, 60000);
}

</script>
</body>
</html>
